// Bipropellant
// [L*q*d*] is intended to target LiquidFuel, LqdHydrogen and LqdMethane
@PART:HAS[~chemTechTankType,@RESOURCE[L*q*d*],@RESOURCE[Oxidizer],!MODULE:HAS[@PROPELLANT[L*q*d*],@PROPELLANT[Oxidizer]],!MODULE:HAS[#resourceName[L*q*d*],#resourceName[Oxidizer]]]:BEFORE[zz_ChemicalPropulsion]
{
	// Pure tank containing LiquidFuel and Oxidizer
	chemTechTankType = bipropellant
}
@PART:HAS[@RESOURCE[L*q*d*],@RESOURCE[Oxidizer],#ppuVolumeOxidizer]:FOR[zz_ChemicalPropulsion]
{
	// Any part containing LiquidFuel and Oxidizer
	chemTechTankVolumeFuelOxidizer = #$ppuVolumeOxidizer$
	chemTechTankCostFuelOxidizer = #$ppuCostOxidizer$
}
@PART:HAS[#chemTechTankVolumeFuelOxidizer,#ppuVolumeLiquidFuel]:FOR[zz_ChemicalPropulsion]
{
	@chemTechTankVolumeFuelOxidizer += #$ppuVolumeLiquidFuel$
	@chemTechTankCostFuelOxidizer += #$ppuCostLiquidFuel$
}
@PART:HAS[#chemTechTankVolumeFuelOxidizer,#ppuVolumeLqdMethane]:FOR[zz_ChemicalPropulsion]
{
	@chemTechTankVolumeFuelOxidizer += #$ppuVolumeLqdMethane$
	@chemTechTankCostFuelOxidizer += #$ppuCostLqdMethane$
}
@PART:HAS[#chemTechTankVolumeFuelOxidizer,#ppuVolumeLqdHydrogen]:FOR[zz_ChemicalPropulsion]
{
	@chemTechTankVolumeFuelOxidizer += #$ppuVolumeLqdHydrogen$
	@chemTechTankCostFuelOxidizer += #$ppuCostLqdHydrogen$
}
@PART:HAS[#chemTechTankType[bipropellant]]:FOR[zz_ChemicalPropulsion]
{
	// Assign resource options for pure tank
	chemTechFuel = Kerosene
	chemTechFuel = Hydrazine
	chemTechFuel = LqdHydrogen
	chemTechOxidizer = LqdOxygen
	chemTechOxidizer = NTO
}

// Aviation
@PART:HAS[~chemTechTankType,@RESOURCE[LiquidFuel],!RESOURCE[Oxidizer],!MODULE:HAS[@PROPELLANT[LiquidFuel],!PROPELLANT[Oxidizer]],!MODULE:HAS[#resourceName[LiquidFuel]]]:BEFORE[zz_ChemicalPropulsion]
{
	// Pure tank containing LiquidFuel and not Oxidizer
	chemTechTankType = aviation
}
@PART:HAS[#ppuVolumeLiquidFuel,!RESOURCE[Oxidizer]]:FOR[zz_ChemicalPropulsion]
{
	// Any part containing LiquidFuel and no Oxidizer
	chemTechTankVolumeFuelOxidizer = #$ppuVolumeLiquidFuel$
	chemTechTankCostFuelOxidizer = #$ppuCostLiquidFuel$
}
@PART:HAS[#chemTechTankType[aviation]]:FOR[zz_ChemicalPropulsion]
{
	// Assign resource options for pure tank
	chemTechFuel = Kerosene
	chemTechFuel = LqdHydrogen
	chemTechOxidizer = LqdOxygen
}

// Single storable propellant (must be manually assigned)
@PART:HAS[#chemTechTankType[storable]]:FOR[zz_ChemicalPropulsion]
{
	// Assign resource options for pure tank
	chemTechPropellant = Kerosene
	chemTechPropellant = HTP
	chemTechPropellant = Hydrazine
	chemTechPropellant = NTO
}

// Single cryogenic propellant
@PART:HAS[~chemTechTankType,@RESOURCE[LqdHydrogen],!RESOURCE[Oxidizer],!MODULE:HAS[@PROPELLANT[LqdHydrogen],!PROPELLANT[Oxidizer]],!MODULE:HAS[#resourceName[LqdHydrogen]]]:BEFORE[zz_ChemicalPropulsion]
{
	// Pure tank containing LqdHydrogen and not Oxidizer
	chemTechTankType = cryogenic
}
@PART:HAS[#ppuVolumeLqdHydrogen,!RESOURCE[Oxidizer]]:FOR[zz_ChemicalPropulsion]
{
	// Any part containing LqdHydrogen and no Oxidizer
	chemTechTankVolumePropellant = #$ppuVolumeLqdHydrogen$
	chemTechTankCostPropellant = #$ppuCostLqdHydrogen$
}
@PART:HAS[#chemTechTankType[cryogenic]]:FOR[zz_ChemicalPropulsion]
{
	// Assign resource options for pure tank
	chemTechPropellant = LqdOxygen
	chemTechPropellant = LqdHydrogen
}

// Monopropellant
@PART:HAS[~chemTechTankType,@RESOURCE[MonoPropellant],!MODULE:HAS[@PROPELLANT[MonoPropellant]],!MODULE:HAS[#resourceName[MonoPropellant]]]:BEFORE[zz_ChemicalPropulsion]
{
	// Pure tank containing MonoPropellant
	chemTechTankType = monopropellant
}
@PART:HAS[@RESOURCE[MonoPropellant],!RESOURCE[SolidFuel]]:FOR[zz_ChemicalPropulsion]
{
	// Any part containing MonoPropellant and no SolidFuel
	chemTechTankVolumePropellant = #$ppuVolumeMonoPropellant$
	chemTechTankCostPropellant = #$ppuCostMonoPropellant$
}
@PART:HAS[@RESOURCE[MonoPropellant],@RESOURCE[SolidFuel]]:FOR[zz_ChemicalPropulsion]
{
	// Any part containing MonoPropellant and SolidFuel
	chemTechTankVolumeRCSPropellant = #$ppuVolumeMonoPropellant$
	chemTechTankCostRCSPropellant = #$ppuCostMonoPropellant$
}
@PART:HAS[#chemTechTankType[monopropellant]]:FOR[zz_ChemicalPropulsion]
{
	// Assign resource options for pure tank
	chemTechPropellant = HTP
	chemTechPropellant = LqdAmmonia
	chemTechPropellant = Hydrazine
}

// Ignitor fluid
@PART:HAS[#chemTechTankType[ignitor]]:FOR[zz_ChemicalPropulsion]
{
	// Assign resource options for pure tank
	chemTechIgnitor = Aniline
	chemTechIgnitor = Hydrazine
	chemTechIgnitor = IWFNA
	chemTechIgnitor = NTO
	chemTechIgnitor = TEATEB
	chemTechIgnitor = Pentaborane
	chemTechIgnitor = Diborane
	chemTechIgnitor = N2F4
	chemTechIgnitor = LqdFluorine
}

// Solid fuel
@PART:HAS[@RESOURCE[SolidFuel]]:FOR[zz_ChemicalPropulsion]
{
	chemTechTankVolumePropellant = #$ppuVolumeSolidFuel$
	chemTechTankCostPropellant = #$ppuCostSolidFuel$
}

// Compute tank mass offset
@PART:HAS[#chemTechTankVolumeFuelOxidizer]:FOR[zz_ChemicalPropulsion]
{
	chemTechTankMassFuelOxidizer = #$chemTechTankVolumeFuelOxidizer$
	@chemTechTankMassFuelOxidizer *= 0.000125
}
@PART:HAS[#chemTechTankVolumeFuel]:FOR[zz_ChemicalPropulsion]
{
	chemTechTankMassFuel = #$chemTechTankVolumeFuel$
	@chemTechTankMassFuel *= 0.000125
}
@PART:HAS[#chemTechTankVolumePropellant]:FOR[zz_ChemicalPropulsion]
{
	chemTechTankMassPropellant = #$chemTechTankVolumePropellant$
	@chemTechTankMassPropellant *= 0.000125
}
@PART:HAS[#chemTechTankMassPropellant,#chemTechPropellant[LqdHydrogen]]:FOR[zz_ChemicalPropulsion]
{
	@chemTechTankMassPropellant *= 0.17004
}
@PART:HAS[#chemTechTankVolumeIgnitor]:FOR[zz_ChemicalPropulsion]
{
	chemTechTankMassIgnitor = #$chemTechTankVolumeIgnitor$
	@chemTechTankMassIgnitor *= 0.000125
}

// Fix tank category
@PART:HAS[#chemTechTankType,#category[Propulsion]]:BEFORE[zzz_ChemicalPropulsion]
{
	@category = FuelTank
}

// Remove stock resources
@PART:FOR[zzz_ChemicalPropulsion]
{	
	-RESOURCE[LiquidFuel] {}
	-RESOURCE[Oxidizer] {}
	-RESOURCE[MonoPropellant] {}
	-RESOURCE[SolidFuel] {}
}