// Apply tank volume changes to ModuleIgnitionTankController
@PART:HAS[#chemTechTankVolumeFuelOxidizer,@MODULE[ModuleB9PartSwitch]:HAS[#chemTechConvertTankSwitch[true]]]:FOR[zzz_ChemicalPropulsion]
{
	@MODULE[ModuleB9PartSwitch]:HAS[#chemTechConvertTankSwitch[true]]
	{
		@SUBTYPE,*
		{
			MODULE
			{
				IDENTIFIER
				{
					name = ModuleIgnitionTankController
					moduleID = chemTechFuelOxidizer
				}
				DATA
				{
					volume = 0
				}
			}
		}
		@SUBTYPE:HAS[#tankType],*
		{
			@MODULE:HAS[@IDENTIFIER[ModuleIgnitionTankController]:HAS[#moduleID[chemTechFuelOxidizer]]]
			{
				@DATA
				{
					@volume += #$../../../../chemTechTankVolumeFuelOxidizer$
				}
			}
		}
	}
}
@PART:HAS[#chemTechTankVolumePropellant,@MODULE[ModuleB9PartSwitch]:HAS[#chemTechConvertTankSwitch[true]]]:FOR[zzz_ChemicalPropulsion]
{
	@MODULE[ModuleB9PartSwitch]:HAS[#chemTechConvertTankSwitch[true]]
	{
		@SUBTYPE,*
		{
			MODULE
			{
				IDENTIFIER
				{
					name = ModuleIgnitionTankController
					moduleID = chemTechPropellant
				}
				DATA
				{
					volume = 0
				}
			}
		}
		@SUBTYPE:HAS[#tankType],*
		{
			@MODULE:HAS[@IDENTIFIER[ModuleIgnitionTankController]:HAS[#moduleID[chemTechPropellant]]]
			{
