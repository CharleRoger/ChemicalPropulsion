// Apply tank volume changes to ModuleIgnitionTankController
@PART:HAS[#chemTechTankVolumeFuelOxidizer,@MODULE[ModuleB9PartSwitch]:HAS[#chemTechConvertTankSwitch[true]]]:FOR[zzz_ChemicalPropulsion]
{
	@MODULE[ModuleB9PartSwitch]:HAS[#chemTechConvertTankSwitch[true]]
	{
		@SUBTYPE,*
		{
			MODULE
			{
				IDENTIFIER
				{
					name = ModuleIgnitionTankController
					moduleID = chemTechFuelOxidizer
				}
				DATA
				{
					volume = #$../../../../chemTechTankVolumeFuelOxidizer$
				}
			}
		}
	}
}
@PART:HAS[#chemTechTankVolumePropellant,@MODULE[ModuleB9PartSwitch]:HAS[#chemTechConvertTankSwitch[true]]]:FOR[zzz_ChemicalPropulsion]
{
	@MODULE[ModuleB9PartSwitch]:HAS[#chemTechConvertTankSwitch[true]]
	{
		@SUBTYPE,*
		{
			MODULE
			{
				IDENTIFIER
				{
					name = ModuleIgnitionTankController
					moduleID = chemTechPropellant
				}
				DATA
				{
					volume = #$../../../../chemTechTankVolumePropellant$
				}
			}
		}
	}
}
@PART:HAS[@MODULE[ModuleB9PartSwitch]:HAS[#chemTechConvertTankSwitch[true]]]:FOR[zzz_ChemicalPropulsion]
{
	// Tank switches changing type, must have a baseVolume so use that
	@MODULE[ModuleB9PartSwitch]:HAS[#chemTechConvertTankSwitch[true],@SUBTYPE:HAS[#tankType]]
	{
		@SUBTYPE:HAS[~tankType],*
		{
			@MODULE:HAS[@IDENTIFIER[ModuleIgnitionTankController]]
			{
				@DATA
				{
					@volume = 0
				}
			}
		}
		@SUBTYPE:HAS[#tankType,#volumeAdded],*
		{
			@MODULE:HAS[@IDENTIFIER[ModuleIgnitionTankController]]
			{
				@DATA
				{
					@volume = #$../../../baseVolume$
					@volume += #$../../volumeAdded$
					@volume *= 5
				}
			}
		}
		@SUBTYPE:HAS[#tankType,#volumeAddedToParent],*
		{
			@MODULE:HAS[@IDENTIFIER[ModuleIgnitionTankController]]
			{
				@DATA
				{
					@volume = #$../../../baseVolume$
					@volume += #$../../volumeAddedToParent$
					@volume *= 5
				}
			}
		}
		@SUBTYPE:HAS[#tankType],*
		{
			-tankType = _
		}
	}

	// Tank switches only changing volume, assume that the chemTechTankVolume is the correct base volume
	@MODULE[ModuleB9PartSwitch]:HAS[#chemTechConvertTankSwitch[true],!SUBTYPE:HAS[#tankType]]
	{
		@SUBTYPE:HAS[#volumeAdded],*
		{
			@MODULE:HAS[@IDENTIFIER[ModuleIgnitionTankController]]
			{
				@DATA
				{
					@volume /= 5
					@volume += #$../../volumeAdded$
					@volume *= 5
				}
			}
		}
		@SUBTYPE:HAS[#volumeAddedToParent],*
		{
			@MODULE:HAS[@IDENTIFIER[ModuleIgnitionTankController]]
			{
				@DATA
				{
					@volume /= 5
					@volume += #$../../volumeAddedToParent$
					@volume *= 5
				}
			}
		}
	}
}