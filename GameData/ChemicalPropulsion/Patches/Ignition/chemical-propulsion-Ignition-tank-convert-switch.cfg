				}
			}
		}
	}
}
@PART:HAS[@MODULE[ModuleB9PartSwitch]:HAS[#chemTechConvertTankSwitch[true]]]:FOR[zzz_ChemicalPropulsion]
{
	// Tank switches changing type, must have a baseVolume so use that
	@MODULE[ModuleB9PartSwitch]:HAS[#chemTechConvertTankSwitch[true],@SUBTYPE:HAS[#tankType]]
	{
		@SUBTYPE:HAS[~tankType],*
		{
			@MODULE:HAS[@IDENTIFIER[ModuleIgnitionTankController]]
			{
				@DATA
				{
					@volume = 0
				}
			}
		}
		@SUBTYPE:HAS[#tankType,#volumeAdded],*
		{
			@MODULE:HAS[@IDENTIFIER[ModuleIgnitionTankController]]
			{
				@DATA
				{
					@volume = #$../../../baseVolume$
					@volume += #$../../volumeAdded$
					@volume *= 5
				}
			}
		}
		@SUBTYPE:HAS[#tankType,#volumeAddedToParent],*
		{
			@MODULE:HAS[@IDENTIFIER[ModuleIgnitionTankController]]
			{
				@DATA
				{
					@volume = #$../../../baseVolume$
					@volume += #$../../volumeAddedToParent$
					@volume *= 5
				}
			}
		}
		@SUBTYPE:HAS[#tankType],*
		{
			-tankType = _
		}
	}

	// Tank switches only changing volume, assume that the chemTechTankVolume is the correct base volume
	@MODULE[ModuleB9PartSwitch]:HAS[#chemTechConvertTankSwitch[true],!SUBTYPE:HAS[#tankType]]
	{
		@SUBTYPE:HAS[#volumeAdded],*
		{
			@MODULE:HAS[@IDENTIFIER[ModuleIgnitionTankController]]
			{
				@DATA
				{
					@volume /= 5
					@volume += #$../../volumeAdded$
					@volume *= 5
				}
			}
		}
		@SUBTYPE:HAS[#volumeAddedToParent],*
		{
			@MODULE:HAS[@IDENTIFIER[ModuleIgnitionTankController]]
			{
				@DATA
				{
					@volume /= 5
					@volume += #$../../volumeAddedToParent$
					@volume *= 5
				}
			}
		}
	}

	// Tank switches which add RESOURCE nodes directly
	@MODULE[ModuleB9PartSwitch]:HAS[#chemTechConvertTankSwitch[true],!SUBTYPE:HAS[#tankType]]
	{
		@SUBTYPE:HAS[@RESOURCE[SolidFuel]],*
		{
			@RESOURCE[SolidFuel]
			{
				volume = #$../../baseVolume$
				@volume *= #$unitsPerVolume$
				@volume *= 5
			}
			@MODULE:HAS[@IDENTIFIER[ModuleIgnitionTankController]]
			{
				@DATA
				{
					@volume += #$../../RESOURCE[SolidFuel]/volume$
				}
			}
		}
		@SUBTYPE:HAS[@RESOURCE[LiquidFuel]],*
		{
			@RESOURCE[LiquidFuel]
			{
				volume = #$../../baseVolume$
				@volume *= #$unitsPerVolume$
				@volume *= 5
			}
			@MODULE:HAS[@IDENTIFIER[ModuleIgnitionTankController]]
			{
				@DATA
				{
					@volume += #$../../RESOURCE[LiquidFuel]/volume$
				}
			}
		}
		@SUBTYPE:HAS[@RESOURCE[Oxidizer]],*
		{
			@RESOURCE[Oxidizer]
			{
				volume = #$../../baseVolume$
				@volume *= #$unitsPerVolume$
				@volume *= 5
			}
			@MODULE:HAS[@IDENTIFIER[ModuleIgnitionTankController]]
			{
				@DATA
				{
					@volume += #$../../RESOURCE[Oxidizer]/volume$
				}
			}
		}
		@SUBTYPE:HAS[@RESOURCE[MonoPropellant]],*
		{
			@RESOURCE[MonoPropellant]
			{
				volume = #$../../baseVolume$
				@volume *= #$unitsPerVolume$
				@volume *= 4
			}
			@MODULE:HAS[@IDENTIFIER[ModuleIgnitionTankController]]
			{
				@DATA
				{
					@volume += #$../../RESOURCE[MonoPropellant]/volume$
				}
			}
		}
		@SUBTYPE,*
		{
			-RESOURCE[SolidFuel] {}
			-RESOURCE[MonoPropellant] {}
			-RESOURCE[LiquidFuel] {}
			-RESOURCE[Oxidizer] {}
		}
	}
}