@PART:HAS[#chemTechTankVolumeFuelOxidizer,@MODULE[ModuleB9PartSwitch]:HAS[#chemTechConvertTankSwitch[true]]]:FOR[zzz_ChemicalPropulsion]
{
	// Apply tank volume changes to ModuleIgnitionTankController
	@MODULE[ModuleB9PartSwitch]:HAS[#chemTechConvertTankSwitch[true]]
	{
		// baseVolume should have already been consumed by chemical-propulsion-B9PartSwitch.cfg

		@SUBTYPE:HAS[#volumeAdded],*
		{
			-tankType = _
			MODULE
			{
				IDENTIFIER
				{
					name = ModuleIgnitionTankController
					moduleID = chemTechFuelOxidizer
				}
				DATA
				{
					volume = #$../../volumeAdded$
					@volume *= 5
					@volume += #$../../../../chemTechTankVolumeFuelOxidizer$
				}
			}
		}
		@SUBTYPE:HAS[#volumeAddedToParent],*
		{
			-tankType = _
			MODULE
			{
				IDENTIFIER
				{
					name = ModuleIgnitionTankController
					moduleID = chemTechFuelOxidizer
				}
				DATA
				{
					volume = #$../../volumeAddedToParent$
					@volume *= 5
					@volume += #$../../../../chemTechTankVolumeFuelOxidizer$
				}
			}
		}
		@SUBTYPE:HAS[~volumeAdded,~volumeAddedToParent],*
		{
			-tankType = _
			MODULE
			{
				IDENTIFIER
				{
					name = ModuleIgnitionTankController
					moduleID = chemTechFuelOxidizer
				}
				DATA
				{
					volume = #$../../../../chemTechTankVolumeFuelOxidizer$
				}
			}
		}
	}
}
