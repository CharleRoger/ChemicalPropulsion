@PART:HAS[@MODULE[ModuleIgnitionEngineController],@MODULE[ModuleB9PartSwitch]:HAS[#chemTechConvertEngineSwitch[true]]]:FOR[zzz_ChemicalPropulsion]
{
	// Assume that thrust and isp changing is already handled by the part switch
	@MODULE[ModuleIgnitionEngineController],*
	{
		AutoComputeThrust = false
		AutoComputeIsp = false
	}

	// Convert existing ModuleB9PartSwitch to apply propellant, thrust and isp changes to ModuleIgnitionEngineController
	@MODULE[ModuleB9PartSwitch]:HAS[#chemTechConvertEngineSwitch[true]]
	{
		@SUBTYPE:HAS[@MODULE:HAS[@IDENTIFIER[ModuleEngines*],@DATA:HAS[@atmosphereCurve,#maxThrust]]],* // maxThrust & atmosphereCurve
		{
			MODULE
			{
				IDENTIFIER
				{
					name = ModuleIgnitionEngineController
				}
				DATA
				{
					MaxThrustOriginal = #$../../MODULE:HAS[@IDENTIFIER[ModuleEngines*]]/DATA/maxThrust$
					IspVacuumOriginal = #$../../MODULE:HAS[@IDENTIFIER[ModuleEngines*]]/DATA/atmosphereCurve/key,0[1, ]$
					IspSeaLevelOriginal = #$../../MODULE:HAS[@IDENTIFIER[ModuleEngines*]]/DATA/atmosphereCurve/key,1[1, ]$
				}
			}
		}
		@SUBTYPE:HAS[@MODULE:HAS[@IDENTIFIER[ModuleEngines*],@DATA:HAS[!atmosphereCurve,#maxThrust]]],* // Only maxThrust
		{
			MODULE
			{
				IDENTIFIER
				{
					name = ModuleIgnitionEngineController
				}
				DATA
				{
					MaxThrustOriginal = #$../../MODULE:HAS[@IDENTIFIER[ModuleEngines*]]/DATA/maxThrust$
				}
			}
		}
		@SUBTYPE:HAS[@MODULE:HAS[@IDENTIFIER[ModuleEngines*],@DATA:HAS[@atmosphereCurve,~maxThrust]]],* // Only atmosphereCurve
		{
			MODULE
			{
				IDENTIFIER
				{
					name = ModuleIgnitionEngineController
				}
				DATA
				{
					MaxThrustOriginal = #$../../../../MODULE[ModuleEngines*]/maxThrust$
					IspVacuumOriginal = #$../../MODULE:HAS[@IDENTIFIER[ModuleEngines*]]/DATA/atmosphereCurve/key,0[1, ]$
					IspSeaLevelOriginal = #$../../MODULE:HAS[@IDENTIFIER[ModuleEngines*]]/DATA/atmosphereCurve/key,1[1, ]$
				}
			}
		}
		@SUBTYPE:HAS[@MODULE:HAS[@IDENTIFIER[ModuleEngines*],@DATA:HAS[!atmosphereCurve,~maxThrust]]],* // Neither maxThrust nor atmosphereCurve
		{
			MODULE
			{
				IDENTIFIER
				{
					name = ModuleIgnitionEngineController
				}
				DATA
				{
					MaxThrustOriginal = #$../../../../MODULE[ModuleEngines*]/maxThrust$
					IspVacuumOriginal = #$../../../../MODULE[ModuleEngines*]/atmosphereCurve/key,0[1, ]$
					IspSeaLevelOriginal = #$../../../../MODULE[ModuleEngines*]/atmosphereCurve/key,1[1, ]$
				}
			}
		}
		@SUBTYPE:HAS[!MODULE:HAS[@IDENTIFIER[ModuleEngines*]]],* // Subtypes without ModuleEngines* modification
		{
			MODULE
			{
				IDENTIFIER
				{
					name = ModuleIgnitionEngineController
				}
				DATA
				{
					MaxThrustOriginal = #$../../../../MODULE[ModuleEngines*]/maxThrust$
					IspVacuumOriginal = #$../../../../MODULE[ModuleEngines*]/atmosphereCurve/key,0[1, ]$
					IspSeaLevelOriginal = #$../../../../MODULE[ModuleEngines*]/atmosphereCurve/key,1[1, ]$
				}
			}
		}

