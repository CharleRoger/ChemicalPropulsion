					IspVacuumOriginal = #$../../MODULE:HAS[@IDENTIFIER[ModuleEnginesFX]]/DATA/atmosphereCurve/key,0[1, ]$
					IspSeaLevelOriginal = #$../../MODULE:HAS[@IDENTIFIER[ModuleEnginesFX]]/DATA/atmosphereCurve/key,1[1, ]$
                }
            }
        }

