//
// X-15 Supercharger Ejector RamJet (SERJ)
// This conceptual engine was planned to use a mix of Kerosene and High Test Peroxide for the Rocket Augmented Ramjet. This patch enables that.

@PART[bluedog_X15_SERJ_Engine]:BEFORE[zz_ChemicalPropulsion]
{
    @MODULE[ModuleEnginesFX]:HAS[#engineID[ClosedCycle]]
    {
		%chemTechFuel = Kerosene
        %chemTechOxidizer = HTP
    }
}
@PART[bluedog_X15_SERJ_Engine]:HAS[@MODULE[MultiModeEngine],@MODULE[ModuleEngines*]:HAS[#chemTechFuel[Kerosene],@PROPELLANT[IntakeAir]],@MODULE[ModuleEngines*]:HAS[#chemTechFuel[Kerosene],#chemTechOxidizer[HTP]]]:FOR[zzz_ChemicalPropulsion]
{
	chemTechMultiModeEngineSupported = true
	@MODULE[ModuleIgnitionEngineController]
	{
		%moduleID = chemTechFuel
		%engineID = AirBreathing
	}
	+MODULE[ModuleIgnitionEngineController]
	{
		%moduleID = chemTechFuelOxidizer
		%engineID = ClosedCycle
	}
}
@PART[bluedog_X15_SERJ_Engine]:FOR[zzz_ChemicalPropulsion]
{
    -MODULE[ModuleB9PartSwitch]:HAS[#moduleID[chemTechIgnitorSwitch],!SUBTYPE[none]] {}
