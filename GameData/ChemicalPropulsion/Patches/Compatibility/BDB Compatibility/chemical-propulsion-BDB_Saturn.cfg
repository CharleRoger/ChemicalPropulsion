@PART[bluedog_Saturn_LRB_Tank,bluedog_Saturn_S1_Tanks,bluedog_Saturn_S1C_Tank,bluedog_Saturn_S1E_Tank,bluedog_Saturn_S1E_Tank,bluedog_Saturn_S2_Tank,bluedog_Saturn_S4_AdapterTank,bluedog_Saturn_S4_Tank,bluedog_Saturn_S4B_Tank,bluedog_Saturn_S4F_Tank]:BEFORE[zz_ChemicalPropulsion]
{
	chemTechTankType = bipropellant
}
@PART[bluedog_Saturn_LRB_Tank,bluedog_Saturn_S1_Tanks,bluedog_Saturn_S1C_Tank,bluedog_Saturn_S1E_Tank,bluedog_Saturn_S1E_Tank,bluedog_Saturn_S2_Tank,bluedog_Saturn_S4_AdapterTank,bluedog_Saturn_S4_Tank,bluedog_Saturn_S4B_Tank,bluedog_Saturn_S4F_Tank]:FOR[zz_ChemicalPropulsion]
{
	// Any part with a B9PartSwitch with base volume, no empty subtype, and all BDB tankTypes
	chemTechTankVolumeFuelOxidizer = #$MODULE[ModuleB9PartSwitch]:HAS[#baseVolume,~baseVolume[0],!SUBTYPE:HAS[~tankType],@SUBTYPE:HAS[#tankType[bdb*]]]/baseVolume$
	@chemTechTankVolumeFuelOxidizer *= 5
	-MODULE[ModuleB9PartSwitch]:HAS[#baseVolume,~baseVolume[0],!SUBTYPE:HAS[~tankType],@SUBTYPE:HAS[#tankType[bdb*]]] {}
}

@PART[bluedog_Saturn_S1_Tanks,bluedog_Saturn_S1C_Tank,bluedog_Saturn_S1E_Tank,bluedog_Saturn_S1E_Tank,bluedog_Saturn_S2_Tank,bluedog_Saturn_S4_Tank,bluedog_Saturn_S4B_Tank,bluedog_Saturn_S4F_Tank]:AFTER[zz_ChemicalPropulsion]
{
    @MODULE[ModuleB9PartSwitch]:HAS[#moduleID[meshSwitchLength]]
    {
        @parentID = chemTechFuelSwitch

		@SUBTYPE:HAS[#volumeAddedToParent],*
		{
			MODULE
			{
				IDENTIFIER
				{
					name = ModuleIgnitionTankController
					moduleID = chemTechFuelOxidizer
				}
				DATA
				{
					volume = #$../../volumeAddedToParent$
					@volume *= 5
					@volume += #$../../../../chemTechTankVolumeFuelOxidizer$
				}
			}
		}
		@SUBTYPE:HAS[~volumeAddedToParent],*
		{
			-volumeAddedToParent = _
			MODULE
			{
				IDENTIFIER
				{
					name = ModuleIgnitionTankController
					moduleID = chemTechFuelOxidizer
				}
				DATA
				{
					volume = #$../../../../chemTechTankVolumeFuelOxidizer$
				}
			}
		}
	}
}