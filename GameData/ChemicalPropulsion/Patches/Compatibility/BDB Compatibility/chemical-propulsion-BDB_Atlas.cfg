@PART[bluedog_atlas_aftTank,bluedog_atlas_conicalTanks,bluedog_atlas_coreTank,bluedog_atlas_extensionTanks,bluedog_Atlas_SLV3X_5engineAftTank,bluedog_Atlas_SLV3X_aftAdapter,bluedog_Atlas_SLV3X_extensionTank,bluedog_Atlas_SLV3X_conicalAdapterTank,bluedog_Atlas_SLV3X_coreTank,bluedog_CELV_MainTank,bluedog_CELV_ConicalAdapterTank,bluedog_Atlas_CELV_extensionTank]:BEFORE[zz_ChemicalPropulsion]
{
	chemTechTankType = bipropellant
}
@PART[bluedog_atlas_aftTank,bluedog_atlas_conicalTanks,bluedog_atlas_coreTank,bluedog_atlas_extensionTanks,bluedog_Atlas_SLV3X_5engineAftTank,bluedog_Atlas_SLV3X_aftAdapter,bluedog_Atlas_SLV3X_extensionTank,bluedog_Atlas_SLV3X_conicalAdapterTank,bluedog_Atlas_SLV3X_coreTank,bluedog_CELV_MainTank,bluedog_CELV_ConicalAdapterTank,bluedog_Atlas_CELV_extensionTank]:FOR[zz_ChemicalPropulsion]
{
	// Any part with a B9PartSwitch with base volume, no empty subtype, and all BDB tankTypes
	chemTechTankVolumeFuelOxidizer = #$MODULE[ModuleB9PartSwitch]:HAS[#baseVolume,~baseVolume[0],!SUBTYPE:HAS[~tankType],@SUBTYPE:HAS[#tankType[bdb*]]]/baseVolume$
	@chemTechTankVolumeFuelOxidizer *= 5
	-MODULE[ModuleB9PartSwitch]:HAS[#baseVolume,~baseVolume[0],!SUBTYPE:HAS[~tankType],@SUBTYPE:HAS[#tankType[bdb*]]] {}
}

@PART[bluedog_atlas_extensionTanks,bluedog_Atlas_CELV_extensionTank,bluedog_Atlas_SLV3X_conicalAdapterTank,bluedog_Atlas_SLV3X_extensionTank,bluedog_CELV_ConicalAdapterTank]:AFTER[zz_ChemicalPropulsion]
{
    @MODULE[ModuleB9PartSwitch]:HAS[#moduleID[meshSwitchSize]]
    {
        @parentID = chemTechFuelSwitch

		@SUBTYPE:HAS[#volumeAddedToParent],*
		{
			MODULE
			{
				IDENTIFIER
				{
					name = ModuleIgnitionTankController
					moduleID = chemTechFuelOxidizer
				}
				DATA
				{
					volume = #$../../volumeAddedToParent$
					@volume *= 5
					@volume += #$../../../../chemTechTankVolumeFuelOxidizer$
				}
			}
		}
		@SUBTYPE:HAS[~volumeAddedToParent],*
		{
			-volumeAddedToParent = _
			MODULE
			{
				IDENTIFIER
				{
					name = ModuleIgnitionTankController
					moduleID = chemTechFuelOxidizer
				}
				DATA
				{
					volume = #$../../../../chemTechTankVolumeFuelOxidizer$
				}
			}
		}
	}
}