@PART[bluedog_LDC_S1_Tank2,bluedog_LDC_S1_Tank1,bluedog_LDC_S2_Tank2,bluedog_LDC_S2_Tank1,bluedog_Titan1_S2_Tank,bluedog_Titan_S2_Tank,bluedog_Titan_S1_LowerTank,bluedog_Titan_S1_UpperTank]:BEFORE[zz_ChemicalPropulsion]
{
	chemTechTankType = bipropellant
}
@PART[bluedog_Titan1_S2_Tank,bluedog_Titan_S2_Tank,bluedog_Titan_S1_LowerTank,bluedog_Titan_S1_UpperTank]:FOR[zz_ChemicalPropulsion]
{
	// Any part with a B9PartSwitch with base volume, no empty subtype, and all BDB tankTypes
	chemTechTankVolumeFuelOxidizer = #$MODULE[ModuleB9PartSwitch]:HAS[#baseVolume,~baseVolume[0],!SUBTYPE:HAS[~tankType],@SUBTYPE:HAS[#tankType[bdb*]]]/baseVolume$ // Cannot parse error [bluedog_LDC_S1_Tank1],[bluedog_LDC_S1_Tank2],[bluedog_LDC_S2_Tank1],[bluedog_LDC_S2_Tank2]
	@chemTechTankVolumeFuelOxidizer *= 5
}
@PART[bluedog_Titan1_S2_Tank,bluedog_Titan_S2_Tank,bluedog_Titan_S1_LowerTank,bluedog_Titan_S1_UpperTank]:FOR[zz_ChemicalPropulsion]
{
	-MODULE[ModuleB9PartSwitch]:HAS[#baseVolume,~baseVolume[0],!SUBTYPE:HAS[~tankType],@SUBTYPE:HAS[#tankType[bdb*]]] {}
}

@PART[bluedog_LDC_S1_Tank2,bluedog_Titan1_S2_Tank,bluedog_Titan_S2_Tank,bluedog_Titan_S1_LowerTank,bluedog_Titan_S1_UpperTank]:AFTER[zz_ChemicalPropulsion]
{
    @MODULE[ModuleB9PartSwitch]:HAS[#parentID[fuelSwitch]]
    {
        @parentID = chemTechFuelSwitch

		@SUBTYPE:HAS[#volumeAddedToParent],*
		{
			MODULE
			{
				IDENTIFIER
				{
					name = ModuleIgnitionTankController
					moduleID = chemTechFuelOxidizer
				}
				DATA
				{
					volume = #$../../volumeAddedToParent$
					@volume *= 5
					@volume += #$../../../../chemTechTankVolumeFuelOxidizer$
				}
			}
		}
		@SUBTYPE:HAS[~volumeAddedToParent],*
		{
			-volumeAddedToParent = _
			MODULE
			{
				IDENTIFIER
				{
					name = ModuleIgnitionTankController
					moduleID = chemTechFuelOxidizer
				}
				DATA
				{
					volume = #$../../../../chemTechTankVolumeFuelOxidizer$
				}
			}
		}
	}
}