// Compatibility for solid rocket motors with niche configurations...
// LIST OF BROKEN SRBs STILL NEEDING FIX(not exhaustive): bluedog_SRMU,bluedog_UA120
// Patch for Little Jeb 2 "Newby" Solid Motor & Little Jeb 2 "Triple Newby" Solid Motor Bundle that uses a custom B9PartSwitch for SolidFuel :\
@PART[bluedog_LittleJoe2_Recruit]:AFTER[zz_ChemicalPropulsion]
{
	@MODULE[ModuleB9PartSwitch]:HAS[#moduleID[engineSwitch]]
    {
        %parentID = chemTechPropellantSwitch
		
		@SUBTYPE[Triple]
		{
			MODULE
			{
				IDENTIFIER
				{
					name = ModuleIgnitionTankController
					moduleID = chemTechPropellant
				}
				DATA
				{
					volume = 6.8 // Hardcoded for SUBTYPE[Triple]
					@volume *= 5
					@volume += #$../../../../chemTechTankVolumePropellant$
				}
			}
			-RESOURCE[SolidFuel] {}
		}
		@SUBTYPE[Single]
		{
			-volumeAdded = _
			MODULE
			{
				IDENTIFIER
				{
					name = ModuleIgnitionTankController
					moduleID = chemTechPropellant
				}
				DATA
				{
					volume = #$../../../../chemTechTankVolumePropellant$
				}
			}
			-RESOURCE[SolidFuel] {}
		}
	}
}

// Castor2 is in BluedogDB_CCK Daleth/Fenris Category

@PART[bluedog_Castor2]:FOR[zz_ChemicalPropulsion]
{
	// Any part with a B9PartSwitch with base volume, no empty subtype, and all BDB tankTypes
	chemTechTankVolumePropellant = #$MODULE[ModuleB9PartSwitch]:HAS[#baseVolume,~baseVolume[0]]/baseVolume$
	@chemTechTankVolumePropellant *= 5
}
@PART[bluedog_Castor2]:AFTER[zz_ChemicalPropulsion]
{
	@MODULE[ModuleB9PartSwitch]:HAS[#moduleID[engineSwitch]]
    {
        %parentID = chemTechPropellantSwitch
		
		@SUBTYPE[CastorII]
		{
			MODULE
			{
				IDENTIFIER
				{
					name = ModuleIgnitionTankController
					moduleID = chemTechPropellant
				}
				DATA
				{
					volume = 10 // Hardcoded from SUBTYPE[CastorII]
					@volume *= 5
					@volume += #$../../../../chemTechTankVolumePropellant$
				}
			}
			-RESOURCE[SolidFuel] {}
		}
		@SUBTYPE[CastorI]
		{
			-volumeAdded = _
			MODULE
			{
				IDENTIFIER
				{
					name = ModuleIgnitionTankController
					moduleID = chemTechPropellant
				}
				DATA
				{
					volume = #$../../../../chemTechTankVolumePropellant$
				}
			}
			-RESOURCE[SolidFuel] {}
		}
	}
}