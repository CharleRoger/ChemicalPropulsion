@PART[bluedog_AtlasV_GEM63,bluedog_LittleJoe2_Recruit,bluedog_Delta_GEM40,bluedog_Delta_GEM46,bluedog_Delta_GEM60,bluedog_Explorer_Star17,bluedog_Castor2,bluedog_Castor4,bluedog_Peacekeeper_Castor120,bluedog_UpperSolids_Altair,bluedog_UpperSolids_Star24,bluedog_UpperSolids_Star37BV,bluedog_UpperSolids_Star37FMV,bluedog_UpperSolids_Star48BV,bluedog_SRMU,bluedog_Titan2_S2_VernierMotor,bluedog_UA120]:HAS[@RESOURCE[SolidFuel],!MODULE[ModuleB9PartSwitch]:HAS[#moduleID[engineSwitch],#baseVolume]]:BEFORE[zz_ChemicalPropulsion] // RESOURCE[SolidFuel]
{
	chemTechTankVolumePropellant = #$RESOURCE[SolidFuel]/maxAmount$
	chemTechTankCostPropellant = #$chemTechTankVolumePropellant$
	@chemTechTankCostPropellant *= #$@RESOURCE_DEFINITION[SolidFuel]/unitCost$
	@chemTechTankVolumePropellant *= 5
	-RESOURCE[SolidFuel],* {}
}
@PART[bluedog_AtlasV_GEM63,bluedog_LittleJoe2_Recruit,bluedog_Delta_GEM40,bluedog_Delta_GEM46,bluedog_Delta_GEM60,bluedog_Explorer_Star17,bluedog_Castor2,bluedog_Castor4,bluedog_Peacekeeper_Castor120,bluedog_UpperSolids_Altair,bluedog_UpperSolids_Star24,bluedog_UpperSolids_Star37BV,bluedog_UpperSolids_Star37FMV,bluedog_UpperSolids_Star48BV,bluedog_SRMU,bluedog_Titan2_S2_VernierMotor,bluedog_UA120]:HAS[!RESOURCE[SolidFuel],@MODULE[ModuleB9PartSwitch]:HAS[#moduleID[engineSwitch],#baseVolume]]:BEFORE[zz_ChemicalPropulsion] // ModuleB9PartSwitch[baseVolume]
{
    chemTechTankVolumePropellant = #$MODULE[ModuleB9PartSwitch]:HAS[#moduleID[engineSwitch],#baseVolume]]/baseVolume$
	@chemTechTankVolumePropellant *= 5
}
@PART[bluedog_AtlasV_GEM63,bluedog_LittleJoe2_Recruit,bluedog_Delta_GEM40,bluedog_Delta_GEM46,bluedog_Delta_GEM60,bluedog_Explorer_Star17,bluedog_Castor2,bluedog_Castor4,bluedog_Peacekeeper_Castor120,bluedog_UpperSolids_Altair,bluedog_UpperSolids_Star24,bluedog_UpperSolids_Star37BV,bluedog_UpperSolids_Star37FMV,bluedog_UpperSolids_Star48BV,bluedog_SRMU,bluedog_Titan2_S2_VernierMotor,bluedog_UA120]:HAS[@RESOURCE[SolidFuel],@MODULE[ModuleB9PartSwitch]:HAS[#moduleID[engineSwitch],#baseVolume]]:BEFORE[zz_ChemicalPropulsion] // RESOURCE[SolidFuel] AND ModuleB9PartSwitch[baseVolume], defaults to RESOURCE[SolidFuel]'s value.
{
	chemTechTankVolumePropellant = #$RESOURCE[SolidFuel]/maxAmount$
	chemTechTankCostPropellant = #$chemTechTankVolumePropellant$
	@chemTechTankCostPropellant *= #$@RESOURCE_DEFINITION[SolidFuel]/unitCost$
	@chemTechTankVolumePropellant *= 5
	-RESOURCE[SolidFuel],* {}
}
@PART[bluedog_AtlasV_GEM63,bluedog_LittleJoe2_Recruit,bluedog_Delta_GEM40,bluedog_Delta_GEM46,bluedog_Delta_GEM60,bluedog_Explorer_Star17,bluedog_Castor2,bluedog_Castor4,bluedog_Peacekeeper_Castor120,bluedog_UpperSolids_Altair,bluedog_UpperSolids_Star24,bluedog_UpperSolids_Star37BV,bluedog_UpperSolids_Star37FMV,bluedog_UpperSolids_Star48BV,bluedog_SRMU,bluedog_Titan2_S2_VernierMotor,bluedog_UA120]:BEFORE[zz_ChemicalPropulsion]
{
	@MODULE[ModuleEnginesFX]
	{
		chemTechPropellant = PBAN
	}

	@MODULE[ModuleB9PartSwitch]:HAS[#moduleID[engineSwitch]]
	{
		@SUBTYPE:HAS[@RESOURCE[SolidFuel]],*
		{
			-RESOURCE[SolidFuel],* {}
		}
		@SUBTYPE:HAS[#volumeAdded],*
		{
			MODULE
			{
				IDENTIFIER
				{
					name = ModuleIgnitionTankController
				}
				DATA
				{
					volume = #$../../../baseVolume$
					@volume += #$../../volumeAdded$
					@volume *= 5
				}
			}
			-RESOURCE[SolidFuel] {}
		}
		@SUBTYPE:HAS[~volumeAdded],*
		{
			MODULE
			{
				IDENTIFIER
				{
					name = ModuleIgnitionTankController
				}
				DATA
				{
					volume = #$../../../../chemTechTankVolumePropellant$
				}
			}
		}
		@SUBTYPE:HAS[@MODULE:HAS[@IDENTIFIER[ModuleEnginesFX],@DATA:HAS[@atmosphereCurve,#maxThrust]]],* // maxThrust & atmosphereCurve
		{
			MODULE
			{
				IDENTIFIER
				{
					name = ModuleIgnitionEngineController
				}
				DATA
				{
					MaxThrustOriginal = #$../../MODULE:HAS[@IDENTIFIER[ModuleEnginesFX]]/DATA/maxThrust$
					IspVacuumOriginal = #$../../MODULE:HAS[@IDENTIFIER[ModuleEnginesFX]]/DATA/atmosphereCurve/key,0[1, ]$
					IspSeaLevelOriginal = #$../../MODULE:HAS[@IDENTIFIER[ModuleEnginesFX]]/DATA/atmosphereCurve/key,1[1, ]$
				}
			}
		}
		@SUBTYPE:HAS[@MODULE:HAS[@IDENTIFIER[ModuleEnginesFX],@DATA:HAS[!atmosphereCurve,#maxThrust]]],* // Only maxThrust
		{
			MODULE
			{
				IDENTIFIER
				{
					name = ModuleIgnitionEngineController
				}
				DATA
				{
					MaxThrustOriginal = #$../../MODULE:HAS[@IDENTIFIER[ModuleEnginesFX]]/DATA/maxThrust$
				}
			}
		}
		@SUBTYPE:HAS[@MODULE:HAS[@IDENTIFIER[ModuleEnginesFX],@DATA:HAS[@atmosphereCurve,~maxThrust]]],* // Only atmosphereCurve
		{
			MODULE
			{
				IDENTIFIER
				{
					name = ModuleIgnitionEngineController
				}
				DATA
				{
					MaxThrustOriginal = #$../../../../MODULE[ModuleEnginesFX]/maxThrust$
					IspVacuumOriginal = #$../../MODULE:HAS[@IDENTIFIER[ModuleEnginesFX]]/DATA/atmosphereCurve/key,0[1, ]$
					IspSeaLevelOriginal = #$../../MODULE:HAS[@IDENTIFIER[ModuleEnginesFX]]/DATA/atmosphereCurve/key,1[1, ]$
				}
			}
		}
		@SUBTYPE:HAS[@MODULE:HAS[@IDENTIFIER[ModuleEnginesFX],@DATA:HAS[!atmosphereCurve,~maxThrust]]],* // Neither maxThrust nor atmosphereCurve (looking at you bluedog_Peacekeeper_Castor120 <_<)
		{
			MODULE
			{
				IDENTIFIER
				{
					name = ModuleIgnitionEngineController
				}
				DATA
				{
					MaxThrustOriginal = #$../../../../MODULE[ModuleEnginesFX]/maxThrust$
					IspVacuumOriginal = #$../../../../MODULE[ModuleEnginesFX]/atmosphereCurve/key,0[1, ]$
					IspSeaLevelOriginal = #$../../../../MODULE[ModuleEnginesFX]/atmosphereCurve/key,1[1, ]$
				}
			}
		}
		@SUBTYPE:HAS[!MODULE:HAS[@IDENTIFIER[ModuleEnginesFX]]],* // Subtypes without ModuleEnginesFX modification
		{
			MODULE
			{
				IDENTIFIER
				{
					name = ModuleIgnitionEngineController
				}
				DATA
				{
					MaxThrustOriginal = #$../../../../MODULE[ModuleEnginesFX]/maxThrust$
					IspVacuumOriginal = #$../../../../MODULE[ModuleEnginesFX]/atmosphereCurve/key,0[1, ]$
					IspSeaLevelOriginal = #$../../../../MODULE[ModuleEnginesFX]/atmosphereCurve/key,1[1, ]$
				}
			}
		}
	}
}

