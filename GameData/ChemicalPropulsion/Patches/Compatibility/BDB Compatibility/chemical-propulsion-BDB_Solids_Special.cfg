@PART[bluedog_Minotaur1_SR19,bluedog_Scout_Algol_Inline,bluedog_Scout_Algol_Radial,bluedog_Scout_Algol_Short,bluedog_Scout_Castor_Inline,bluedog_Scout_Antares_Inline,]:HAS[@RESOURCE[SolidFuel]]:BEFORE[zz_ChemicalPropulsion]
{
	chemTechTankVolumePropellant = #$RESOURCE[SolidFuel]/maxAmount$
	chemTechTankCostPropellant = #$chemTechTankVolumePropellant$
	@chemTechTankCostPropellant *= #$@RESOURCE_DEFINITION[SolidFuel]/unitCost$
	@chemTechTankVolumePropellant *= 5
	-RESOURCE[SolidFuel],* {}
}
@PART[bluedog_Minotaur1_SR19,bluedog_Scout_Algol_Inline,bluedog_Scout_Algol_Radial,bluedog_Scout_Algol_Short,bluedog_Scout_Castor_Inline,bluedog_Scout_Antares_Inline]:HAS[@RESOURCE[MonoPropellant],@MODULE[ModuleRCSFX]]:BEFORE[zz_ChemicalPropulsion]
{
	@MODULE[ModuleRCSFX],*
	{
		chemTechPropellant = Hydrazine
		chemTechPropellant = HTP
		-PROPELLANT[MonoPropellant] {}
	}
	chemTechTankVolumeRCS = #$RESOURCE[MonoPropellant]/maxAmount$
	chemTechTankCostRCS = #$chemTechTankVolumeRCS$
	@chemTechTankCostRCS *= #$@RESOURCE_DEFINITION[MonoPropellant]/unitCost$
	@chemTechTankVolumeRCS *= 4
	chemTechTankMassRCS = #$chemTechTankVolumeRCS$
	@chemTechTankMassRCS *= 0.000125
	-RESOURCE[MonoPropellant],* {}
	MODULE
	{
		name = ModuleIgnitionRCSController
		moduleID = chemTechRCSPropellant
		propellantModuleID = chemTechRCSPropellant
	}
	MODULE
	{
		name = ModuleIgnitionTankController
		moduleID = chemTechRCSPropellant
		propellantModuleID = chemTechRCSPropellant
		volume = #$../chemTechTankVolumeRCS$
		%addedMass = #$../chemTechTankMassRCS$
		@addedMass *= -1
		%addedCost = #$../chemTechTankCostRCS$
		@addedCost *= -1
	}
	MODULE
	{
		name = ModuleIgnitionPropellant
		moduleID = chemTechRCSPropellant
		resourceName = HTP
	}
	MODULE
	{
		name = ModuleB9PartSwitch
		moduleID = chemTechPropellantSwitchRCS
		switcherDescription = RCS Propellant
		switcherDescriptionPlural = RCS Propellants
		switchInFlight = False
		chemTechSwitchResourceName = HTP
		chemTechSwitchResourceName = Hydrazine
		uiGroupName = partSwitch
		uiGroupDisplayName = Part Switch
		SUBTYPE
		{
			name = HTP
			title = #LOC_ChemicalCore_HTP_title
			descriptionSummary = #LOC_ChemicalPropulsion_propellant_storable_hypergolic_oxidizer_description
			descriptionDetail = #LOC_ChemicalPropulsion_propellant_HTP_description
			primaryColor = #$@ChemicalCoreResourceColors/HTP$
			defaultSubtypePriority = -16
			MODULE
			{
				IDENTIFIER
				{
					name = ModuleIgnitionPropellant
					moduleID = chemTechRCSPropellant
				}
				DATA
				{
					resourceName = HTP
				}
			}
		}
		SUBTYPE
		{
			name = Hydrazine
			title = #LOC_ChemicalCore_Hydrazine_title
			descriptionSummary = #LOC_ChemicalPropulsion_propellant_storable_hypergolic_fuel_description
			descriptionDetail = #LOC_ChemicalPropulsion_propellant_Hydrazine_description
			primaryColor = #$@ChemicalCoreResourceColors/Hydrazine$
			upgradeRequired = chemical-core-partupgrade-Hydrazine
			defaultSubtypePriority = -3
			MODULE
			{
				IDENTIFIER
				{
					name = ModuleIgnitionPropellant
					moduleID = chemTechRCSPropellant
				}
				DATA
				{
					resourceName = Hydrazine
				}
			}
		}
	}
}
@PART[bluedog_Minotaur1_SR19,bluedog_Scout_Algol_Inline,bluedog_Scout_Algol_Radial,bluedog_Scout_Algol_Short,bluedog_Scout_Castor_Inline,bluedog_Scout_Antares_Inline]:HAS[@MODULE[ModuleRCSFX]]:AFTER[zzz_ChemicalPropulsion]
{
	@MODULE[ModuleB9PartSwitch]:HAS[#moduleID[chemTechPropellantSwitch]]
	{
		-chemTechSwitchResourceName = HTP
		-chemTechSwitchResourceName = Hydrazine
		%chemTechSwitchResourceName = PBAN
		-SUBTYPE[HTP]{}
		-SUBTYPE[Hydrazine]{}
		@SUBTYPE[PBAN]
		{
			-upgradeRequired = _
		}
	}
}
