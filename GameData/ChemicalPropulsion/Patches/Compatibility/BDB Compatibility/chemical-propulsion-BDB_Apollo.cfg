// Apollo = Kane & Sina = Lunar Module (LM) & Little Jeb = Little Joe
@PART[bluedog_LM_Descent_Tanks*,bluedog_Apollo_Block2_SM,bluedog_Apollo_Block3_SM,bluedog_LM_Ascent_Cockpit,bluedog_LM_Taxi]:BEFORE[zz_ChemicalPropulsion]
{
	chemTechTankType = bipropellant
}
@PART[bluedog_LM_Descent_Tanks*,bluedog_Apollo_Block2_SM,bluedog_Apollo_Block3_SM,bluedog_LM_Ascent_Cockpit,bluedog_LM_Taxi]:FOR[zz_ChemicalPropulsion]
{
	// Any part with a B9PartSwitch with base volume, no empty subtype, and all BDB tankTypes
	chemTechTankVolumeFuelOxidizer = #$MODULE[ModuleB9PartSwitch]:HAS[#baseVolume,~baseVolume[0],!SUBTYPE:HAS[~tankType],@SUBTYPE:HAS[#tankType[bdb*]]]/baseVolume$
	@chemTechTankVolumeFuelOxidizer *= 5
	-MODULE[ModuleB9PartSwitch]:HAS[#baseVolume,~baseVolume[0],!SUBTYPE:HAS[~tankType],@SUBTYPE:HAS[#tankType[bdb*]]] {}
}

@PART[bluedog_LittleJoe2_Body,bluedog_LM_Ascent_Cockpit,bluedog_LM_Taxi]:BEFORE[zz_ChemicalPropulsion]
{
	chemTechPropellant = monopropellant
}
@PART[bluedog_LM_Ascent_Cockpit,bluedog_LM_Taxi]
{
	chemTechTankVolumePropellant = #$RESOURCE[MonoPropellant]/maxAmount$
    chemTechTankMassPropellant = #$chemTechTankVolumePropellant$
	@chemTechTankMassPropellant *= 0.000125
    @chemTechTankVolumePropellant *= 4
}

@PART[bluedog_Apollo_Block2_SM,bluedog_Apollo_Block3_SM,bluedog_LM_Ascent_Cockpit,bluedog_LM_Taxi]:AFTER[zz_ChemicalPropulsion]
{
    @MODULE[ModuleB9PartSwitch]:HAS[#moduleID[configSwitch],#parentID[fuelSwitch]]
    {
        @parentID = chemTechFuelSwitch

		@SUBTYPE:HAS[#volumeAddedToParent],*
		{
			MODULE
			{
				IDENTIFIER
				{
					name = ModuleIgnitionTankController
					moduleID = chemTechFuelOxidizer
				}
				DATA
				{
					volume = #$../../volumeAddedToParent$
					@volume *= 5
					@volume += #$../../../../chemTechTankVolumeFuelOxidizer$
				}
			}
		}
		@SUBTYPE:HAS[~volumeAddedToParent],*
		{
			-volumeAddedToParent = _
			MODULE
			{
				IDENTIFIER
				{
					name = ModuleIgnitionTankController
					moduleID = chemTechFuelOxidizer
				}
				DATA
				{
					volume = #$../../../../chemTechTankVolumeFuelOxidizer$
				}
			}
		}
	}
}