@PART[bluedog_Ablestar_Tank,bluedog_HOSS_Tank,bluedog_DeltaIII_AdapterTank,bluedog_DeltaE_Tank,bluedog_Thor_UpperTank_1,bluedog_Thor_LowerTank_1,bluedog_Thor_1p25mAdapter_Long,bluedog_Thor_MediumExtensionTank]:BEFORE[zz_ChemicalPropulsion]
{
	chemTechTankType = bipropellant
}
@PART[bluedog_Ablestar_Tank,bluedog_HOSS_Tank,bluedog_DeltaIII_AdapterTank,bluedog_DeltaE_Tank,bluedog_Thor_UpperTank_1,bluedog_Thor_LowerTank_1,bluedog_Thor_1p25mAdapter_Long,bluedog_Thor_MediumExtensionTank]:FOR[zz_ChemicalPropulsion]
{
	// Any part with a B9PartSwitch with base volume, no empty subtype, and all BDB tankTypes
	chemTechTankVolumeFuelOxidizer = #$MODULE[ModuleB9PartSwitch]:HAS[#baseVolume,~baseVolume[0],!SUBTYPE:HAS[~tankType],@SUBTYPE:HAS[#tankType[bdb*]]]/baseVolume$
	@chemTechTankVolumeFuelOxidizer *= 5
	-MODULE[ModuleB9PartSwitch]:HAS[#baseVolume,~baseVolume[0],!SUBTYPE:HAS[~tankType],@SUBTYPE:HAS[#tankType[bdb*]]] {}
}

@PART[bluedog_Ablestar_Tank,bluedog_DeltaE_Tank]:BEFORE[zz_ChemicalPropulsion]
{
	chemTechPropellant = HTP
    chemTechPropellant = Hydrazine
}
@PART[bluedog_Ablestar_Tank,bluedog_DeltaE_Tank]
{
	chemTechTankVolumePropellant = #$RESOURCE[MonoPropellant]/maxAmount$
    chemTechTankMassPropellant = #$chemTechTankVolumePropellant$
	@chemTechTankMassPropellant *= 0.000125
    @chemTechTankVolumePropellant *= 4
}

@PART[bluedog_Thor_UpperTank_1,bluedog_Thor_LowerTank_1,bluedog_Thor_1p25mAdapter_Long,bluedog_Thor_MediumExtensionTank]:AFTER[zz_ChemicalPropulsion]
{
    @MODULE[ModuleB9PartSwitch]:HAS[#parentID[fuelSwitch]]
    {
        @parentID = chemTechFuelSwitch

		@SUBTYPE:HAS[#volumeAddedToParent],*
		{
			MODULE
			{
				IDENTIFIER
				{
					name = ModuleIgnitionTankController
					moduleID = chemTechFuelOxidizer
				}
				DATA
				{
					volume = #$../../volumeAddedToParent$
					@volume *= 5
					@volume += #$../../../../chemTechTankVolumeFuelOxidizer$
				}
			}
		}
		@SUBTYPE:HAS[~volumeAddedToParent],*
		{
			-volumeAddedToParent = _
			MODULE
			{
				IDENTIFIER
				{
					name = ModuleIgnitionTankController
					moduleID = chemTechFuelOxidizer
				}
				DATA
				{
					volume = #$../../../../chemTechTankVolumeFuelOxidizer$
				}
			}
		}
	}
}