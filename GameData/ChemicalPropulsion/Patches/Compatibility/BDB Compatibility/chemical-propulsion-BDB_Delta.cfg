@PART[bluedog_DeltaK_Stage,bluedog_DeltaIV_DCSS_5m,bluedog_DCSS_Tank,bluedog_DeltaIV_s1_upperTank,bluedog_DeltaIV_s1_lowerTank]:BEFORE[zz_ChemicalPropulsion]
{
	chemTechTankType = bipropellant
}
@PART[bluedog_DeltaK_Stage,bluedog_DeltaIV_DCSS_5m,bluedog_DCSS_Tank,bluedog_DeltaIV_s1_upperTank,bluedog_DeltaIV_s1_lowerTank]:FOR[zz_ChemicalPropulsion]
{
	// Any part with a B9PartSwitch with base volume, no empty subtype, and all BDB tankTypes
	chemTechTankVolumeFuelOxidizer = #$MODULE[ModuleB9PartSwitch]:HAS[#baseVolume,~baseVolume[0],!SUBTYPE:HAS[~tankType],@SUBTYPE:HAS[#tankType[bdb*]]]/baseVolume$
	@chemTechTankVolumeFuelOxidizer *= 5
	-MODULE[ModuleB9PartSwitch]:HAS[#baseVolume,~baseVolume[0],!SUBTYPE:HAS[~tankType],@SUBTYPE:HAS[#tankType[bdb*]]] {}
}

@PART[bluedog_DeltaK_Stage,bluedog_DeltaIV_DCSS_5m,bluedog_DCSS_Tank]:BEFORE[zz_ChemicalPropulsion]
{
	chemTechPropellant = monopropellant
}
@PART[bluedog_DeltaK_Stage]:FOR[zz_ChemicalPropulsion]
{
	chemTechTankVolumePropellant = #$chemTechTankVolumeFuelOxidizer$
    @chemTechTankVolumePropellant *= 0.05 // BDB Default ~5% of volume
}
@PART[bluedog_DeltaIV_DCSS_5m]:FOR[zz_ChemicalPropulsion]
{
	chemTechTankVolumePropellant = #$chemTechTankVolumeFuelOxidizer$
    @chemTechTankVolumePropellant *= 0.03 // BDB Default ~3% of volume
}
@PART[bluedog_DCSS_Tank]:FOR[zz_ChemicalPropulsion]
{
	chemTechTankVolumePropellant = #$chemTechTankVolumeFuelOxidizer$
    @chemTechTankVolumePropellant *= 0.024 // BDB Default ~2.4% of volume
}

@PART[bluedog_DeltaK_Stage,bluedog_DeltaIV_DCSS_5m,bluedog_DCSS_Tank]:AFTER[zz_ChemicalPropulsion]
{
    @MODULE[ModuleB9PartSwitch]:HAS[#parentID[fuelSwitch]]
    {
        @parentID = chemTechFuelSwitch

		@SUBTYPE:HAS[#volumeAddedToParent],*
		{
			MODULE
			{
				IDENTIFIER
				{
					name = ModuleIgnitionTankController
					moduleID = chemTechFuelOxidizer
				}
				DATA
				{
					volume = #$../../volumeAddedToParent$
					@volume *= 5
					@volume += #$../../../../chemTechTankVolumeFuelOxidizer$
				}
			}
		}
		@SUBTYPE:HAS[~volumeAddedToParent],*
		{
			-volumeAddedToParent = _
			MODULE
			{
				IDENTIFIER
				{
					name = ModuleIgnitionTankController
					moduleID = chemTechFuelOxidizer
				}
				DATA
				{
					volume = #$../../../../chemTechTankVolumeFuelOxidizer$
				}
			}
		}
	}
}

@PART[bluedog_Delta_GEM60]:AFTER[zz_ChemicalPropulsion]
{
	@MODULE[ModuleB9PartSwitch]:HAS[#moduleID[engineSwitch]]
    {
        %parentID = chemTechPropellantSwitch
		
		@SUBTYPE[GEM-60XL]
		{
			MODULE
			{
				IDENTIFIER
				{
					name = ModuleIgnitionTankController
					moduleID = chemTechPropellant
				}
				DATA
				{
					volume = 304 // Hardcoded from SUBTYPE[GEM-60XL]
					@volume *= 5
					@volume += #$../../../../chemTechTankVolumePropellant$
				}
			}
			-RESOURCE[SolidFuel] {}
		}
		@SUBTYPE[GEM-60]
		{
			-volumeAdded = _
			MODULE
			{
				IDENTIFIER
				{
					name = ModuleIgnitionTankController
					moduleID = chemTechPropellant
				}
				DATA
				{
					volume = #$../../../../chemTechTankVolumePropellant$
				}
			}
			-RESOURCE[SolidFuel] {}
		}
	}
}