// Centaur = Inon

@PART[bluedog_Centaur_Kickstage,bluedog_CentaurIII_FuelTank,bluedog_CentaurD_FuelTank,bluedog_CentaurT_Tank?]:BEFORE[zz_ChemicalPropulsion]
{
	chemTechTankType = bipropellant
}
@PART[bluedog_Centaur_Kickstage,bluedog_CentaurIII_FuelTank,bluedog_CentaurD_FuelTank,bluedog_CentaurT_Tank?]:FOR[zz_ChemicalPropulsion]
{
	// Any part with a B9PartSwitch with base volume, no empty subtype, and all BDB tankTypes except bdbMonoProp
	chemTechTankVolumeFuelOxidizer = #$MODULE[ModuleB9PartSwitch]:HAS[#baseVolume,~baseVolume[0],!SUBTYPE:HAS[~tankType],@SUBTYPE:HAS[#tankType[bdb*]]]/baseVolume$
	@chemTechTankVolumeFuelOxidizer *= 5
	-MODULE[ModuleB9PartSwitch]:HAS[#baseVolume,~baseVolume[0],!SUBTYPE:HAS[~tankType],@SUBTYPE:HAS[#tankType[bdb*]]] {}
} 

@PART[bluedog_Centaur_Kickstage]:BEFORE[zz_ChemicalPropulsion]
{
	chemTechPropellant = monopropellant
}
@PART[bluedog_Centaur_Kickstage]:BEFORE[zz_ChemicalPropulsion]
{
	chemTechTankVolumePropellant = #$MODULE[ModuleB9PartSwitch]:HAS[#baseVolume,~baseVolume[0],!SUBTYPE:HAS[~tankType],@SUBTYPE:HAS[#tankType[bdbMonoProp]]]/baseVolume$
    chemTechTankMassPropellant = #$chemTechTankVolumePropellant$
	@chemTechTankMassPropellant *= 0.000125
    @chemTechTankVolumePropellant *= 4
}

@PART[bluedog_Centaur_Kickstage,bluedog_CentaurIII_FuelTank,bluedog_CentaurD_FuelTank,bluedog_CentaurT_TankD]:AFTER[zz_ChemicalPropulsion]
{
    @MODULE[ModuleB9PartSwitch]:HAS[#moduleID[meshSwitch*],#parentID[fuelSwitch]]
    {
        @parentID = chemTechFuelSwitch

		@SUBTYPE:HAS[#volumeAddedToParent],*
		{
			MODULE
			{
				IDENTIFIER
				{
					name = ModuleIgnitionTankController
					moduleID = chemTechFuelOxidizer
				}
				DATA
				{
					volume = #$../../volumeAddedToParent$
					@volume *= 5
					@volume += #$../../../../chemTechTankVolumeFuelOxidizer$
				}
			}
		}
		@SUBTYPE:HAS[~volumeAddedToParent],*
		{
			-volumeAddedToParent = _
			MODULE
			{
				IDENTIFIER
				{
					name = ModuleIgnitionTankController
					moduleID = chemTechFuelOxidizer
				}
				DATA
				{
					volume = #$../../../../chemTechTankVolumeFuelOxidizer$
				}
			}
		}
	}
}