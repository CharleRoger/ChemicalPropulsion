// X-15

@PART[bluedog_X15_Fuselage,bluedog_X15_DropTank]:BEFORE[zz_ChemicalPropulsion]
{
    chemTechFuel = Kerosene
	chemTechFuel = Ethanol
	chemTechFuel = LqdAmmonia
	chemTechOxidizer = LqdOxygen
	chemTechOxidizer = HTP
}
@PART[bluedog_X15_Fuselage,bluedog_X15_DropTank]:FOR[zz_ChemicalPropulsion]
{
	// Any part with a B9PartSwitch with base volume, no empty subtype, and all BDB tankTypes
	chemTechTankVolumeFuelOxidizer = #$MODULE[ModuleB9PartSwitch]:HAS[#baseVolume,~baseVolume[0],!SUBTYPE:HAS[~tankType],@SUBTYPE:HAS[#tankType[bdb*]]]/baseVolume$
	@chemTechTankVolumeFuelOxidizer *= 5
	-MODULE[ModuleB9PartSwitch]:HAS[#baseVolume,~baseVolume[0],!SUBTYPE:HAS[~tankType],@SUBTYPE:HAS[#tankType[bdb*]]] {}
}

@PART[bluedog_X15_Fuselage]:AFTER[zz_ChemicalPropulsion]
{
    
	@MODULE[ModuleB9PartSwitch]:HAS[#moduleID[meshSwitchLength]]
    {
        @parentID = chemTechFuelSwitch

		@SUBTYPE:HAS[#volumeAddedToParent],*
		{
			MODULE
			{
				IDENTIFIER
				{
					name = ModuleIgnitionTankController
					moduleID = chemTechFuelOxidizer
				}
				DATA
				{
					volume = #$../../volumeAddedToParent$
					@volume *= 5
					@volume += #$../../../../chemTechTankVolumeFuelOxidizer$
				}
			}
		}
		@SUBTYPE:HAS[~volumeAddedToParent],*
		{
			-volumeAddedToParent = _
			MODULE
			{
				IDENTIFIER
				{
					name = ModuleIgnitionTankController
					moduleID = chemTechFuelOxidizer
				}
				DATA
				{
					volume = #$../../../../chemTechTankVolumeFuelOxidizer$
				}
			}
		}
	}
}

@PART[bluedog_X15_Fuselage]:FOR[zzz_ChemicalPropulsion]
{
	@MODULE[ModuleB9PartSwitch]:HAS[#moduleID[chemTechFuelSwitch],!SUBTYPE[none]],*
	{
		SUBTYPE
		{
			name = none
			title = None
			defaultSubtypePriority = 0
			MODULE
			{
				IDENTIFIER
				{
					name = ModuleIgnitionPropellant
					moduleID = chemTechFuel
				}
				DATA
				{
					resourceName = none
				}
			}
		}
	}
	
	@MODULE[ModuleB9PartSwitch]:HAS[#moduleID[chemTechOxidizerSwitch],!SUBTYPE[none]],*
	{
		SUBTYPE
		{
			name = none
			title = None
			defaultSubtypePriority = 0
			MODULE
			{
				IDENTIFIER
				{
					name = ModuleIgnitionPropellant
					moduleID = chemTechOxidizer
				}
				DATA
				{
					resourceName = none
				}
			}
		}
	}
}
@PART[bluedog_X15_Fuselage]:AFTER[zzz_ChemicalPropulsion]
{
    -MODULE[ModuleB9PartSwitch]:HAS[#moduleID[chemTechIgnitorSwitch],!SUBTYPE[none]] {}
}

@PART[bluedog_X15_Cockpit,bluedog_X15_DroneCore,bluedog_X15_TwoSeater]:AFTER[zzz_ChemicalPropulsion]
{
	@title ^= : Monopropellant : HTP :
	@description ^= : Monopropellant : HTP :
	@MODULE[ModuleResourceConverter]:HAS[@OUTPUT_RESOURCE:HAS[#ResourceName[ElectricCharge]]]
	{
		@ConverterName = APU
		@StartActionName = Start APU [HTP]
		@StopActionName = Stop APU [HTP]
		@ToggleActionName = Toggle APU [HTP]
		
		-INPUT_RESOURCE,* {}
		INPUT_RESOURCE
		{
			ResourceName = HTP
			Ratio = #$../../chemTechRatio$
		}
	}
}

