// Mercury = Hermes

@PART[bluedog_Mercury_Retropack]:BEFORE[zz_ChemicalPropulsion]
{
	chemTechPropellant = monopropellant
}
@PART[bluedog_Mercury_Retropack]:FOR[zz_ChemicalPropulsion]
{
	chemTechTankVolumePropellant = 0
}

@PART[bluedog_Mercury_Retropack]:AFTER[zz_ChemicalPropulsion]
{
	@MODULE[ModuleB9PartSwitch]:HAS[#moduleID[meshSwitchStyle]]
    {
        %parentID = chemTechPropellantSwitch
		
		@SUBTYPE[Enhanced]
		{
			MODULE
			{
				IDENTIFIER
				{
					name = ModuleIgnitionTankController
					moduleID = chemTechPropellant
				}
				DATA
				{
					volume = 32
					@volume += #$../../../../chemTechTankVolumePropellant$
				}
			}
			-RESOURCE[MonoPropellant] {}
		}
		@SUBTYPE[Basic]
		{
			-volumeAdded = _
			MODULE
			{
				IDENTIFIER
				{
					name = ModuleIgnitionTankController
					moduleID = chemTechPropellant
				}
				DATA
				{
					volume = #$../../../../chemTechTankVolumePropellant$
				}
			}
			-RESOURCE[MonoPropellant] {}
		}
	}
}