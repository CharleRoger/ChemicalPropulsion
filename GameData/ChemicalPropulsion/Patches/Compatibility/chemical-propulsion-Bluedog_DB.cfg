			MODULE
			{
				IDENTIFIER
				{
					name = ModuleIgnitionPropellant
					moduleID = chemTechRCSPropellant
				}
				DATA
				{
					resourceName = HTP
				}
			}
		}
		SUBTYPE
		{
			name = Hydrazine
			title = #LOC_ChemicalCore_Hydrazine_title
			descriptionSummary = #LOC_ChemicalPropulsion_propellant_storable_hypergolic_fuel_description
			descriptionDetail = #LOC_ChemicalPropulsion_propellant_Hydrazine_description
			primaryColor = #$@ChemicalCoreResourceColors/Hydrazine$
			upgradeRequired = chemical-core-partupgrade-Hydrazine
			defaultSubtypePriority = -3
			MODULE
			{
				IDENTIFIER
				{
					name = ModuleIgnitionPropellant
					moduleID = chemTechRCSPropellant
				}
				DATA
				{
					resourceName = Hydrazine
				}
			}
		}
	}
