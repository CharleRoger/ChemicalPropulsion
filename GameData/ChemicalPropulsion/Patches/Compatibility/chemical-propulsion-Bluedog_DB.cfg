// Tank volume
@PART[bluedog_Titan1_S2_Tank,bluedog_Titan_S2_Tank,bluedog_Titan_S1_LowerTank,bluedog_Titan_S1_UpperTank]:AFTER[zz_ChemicalPropulsion]
{
	// Any part with a B9PartSwitch with base volume, no empty subtype, and all BDB tankTypes
	%chemTechTankVolumeFuelOxidizer = #$MODULE[ModuleB9PartSwitch]:HAS[#baseVolume,~baseVolume[0],!SUBTYPE:HAS[~tankType],@SUBTYPE:HAS[#tankType[bdb*]]]/baseVolume$ // Cannot parse error [bluedog_LDC_S1_Tank1],[bluedog_LDC_S1_Tank2],[bluedog_LDC_S2_Tank1],[bluedog_LDC_S2_Tank2]
	@chemTechTankVolumeFuelOxidizer *= 5
}
@PART[bluedog_Titan_Transtage]:AFTER[zz_ChemicalPropulsion]
{
	// Any part with a B9PartSwitch with base volume, no empty subtype, no engine switch, and all BDB tankTypes
	%chemTechTankVolumeFuelOxidizer = #$MODULE[ModuleB9PartSwitch]:HAS[#baseVolume,~baseVolume[0],!SUBTYPE:HAS[~tankType],@SUBTYPE:HAS[#tankType[bdb*]]]/baseVolume$
	@chemTechTankVolumeFuelOxidizer *= 5
	-MODULE[ModuleB9PartSwitch]:HAS[#baseVolume,~baseVolume[0],~moduleID[engineSwitch],!SUBTYPE:HAS[~tankType],@SUBTYPE:HAS[#tankType[bdb*]]] {}

	@chemTechTankVolumeFuelOxidizer += #$chemTechTankVolumePropellant$
	@chemTechTankMassFuelOxidizer += #$chemTechTankMassPropellant$
	@chemTechTankCostFuelOxidizer += #$chemTechTankCostPropellant$

	-chemTechTankVolumePropellant = _
	-chemTechTankMassPropellant = _
	-chemTechTankCostPropellant = _
}
@PART[bluedog_*]:HAS[~chemTechTankVolumeFuelOxidizer,@MODULE[ModuleB9PartSwitch]:HAS[#baseVolume,~baseVolume[0],!SUBTYPE:HAS[~tankType],@SUBTYPE:HAS[#tankType[bdb*]]]]:AFTER[zz_ChemicalPropulsion]
{
	// Any part with a B9PartSwitch with base volume, no empty subtype, and all BDB tankTypes
	%chemTechTankVolumeFuelOxidizer = #$MODULE[ModuleB9PartSwitch]:HAS[#baseVolume,~baseVolume[0],!SUBTYPE:HAS[~tankType],@SUBTYPE:HAS[#tankType[bdb*]]]/baseVolume$
	@chemTechTankVolumeFuelOxidizer *= 5
	-MODULE[ModuleB9PartSwitch]:HAS[#baseVolume,~baseVolume[0],!SUBTYPE:HAS[~tankType],@SUBTYPE:HAS[#tankType[bdb*]]] {}
}
@PART[bluedog_LM_Ascent_Cockpit,bluedog_LM_Taxi,bluedog_Ablestar_Tank,bluedog_DeltaE_Tank,bluedog_Vanguard_S2_Tank,bluedog_Vega_EngineMount,bluedog_Vega_ThirdStage_Tank]
{
	chemTechTankVolumePropellant = #$RESOURCE[MonoPropellant]/maxAmount$
	chemTechTankMassPropellant = #$chemTechTankVolumePropellant$
	@chemTechTankMassPropellant *= 0.000125
	@chemTechTankVolumePropellant *= 4
}
@PART[bluedog_Centaur_Kickstage]:BEFORE[zz_ChemicalPropulsion]
{
	%chemTechTankVolumePropellant = #$MODULE[ModuleB9PartSwitch]:HAS[#baseVolume,~baseVolume[0],!SUBTYPE:HAS[~tankType],@SUBTYPE:HAS[#tankType[bdbMonoProp]]]/baseVolume$
	%chemTechTankMassPropellant = #$chemTechTankVolumePropellant$
	@chemTechTankMassPropellant *= 0.000125
	@chemTechTankVolumePropellant *= 4
}
@PART[bluedog_DeltaK_Stage]:AFTER[zz_ChemicalPropulsion]
{
	%chemTechTankVolumePropellant = #$chemTechTankVolumeFuelOxidizer$
	@chemTechTankVolumePropellant *= 0.05 // BDB Default ~5% of volume
}
@PART[bluedog_DeltaIV_DCSS_5m]:AFTER[zz_ChemicalPropulsion]
{
	%chemTechTankVolumePropellant = #$chemTechTankVolumeFuelOxidizer$
	@chemTechTankVolumePropellant *= 0.03 // BDB Default ~3% of volume
}
@PART[bluedog_DCSS_Tank]:AFTER[zz_ChemicalPropulsion]
{
	%chemTechTankVolumePropellant = #$chemTechTankVolumeFuelOxidizer$
	@chemTechTankVolumePropellant *= 0.024 // BDB Default ~2.4% of volume
}
@PART[bluedog_Mercury_Retropack]:AFTER[zz_ChemicalPropulsion]
{
	%chemTechTankVolumePropellant = 0
}

