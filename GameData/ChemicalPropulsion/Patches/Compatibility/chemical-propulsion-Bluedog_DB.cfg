		{
			primaryColor = #$@ChemicalCoreResourceColors/Hydrazine$
			secondaryColor = #$@ChemicalCoreResourceColors/NTO$
			MODULE
			{
				IDENTIFIER
				{
					name = ModuleIgnitionPropellant
					moduleID = chemTechFuel
				}
				DATA 
				{ 
					resourceName = Hydrazine 
				}
			}
			MODULE
			{
				IDENTIFIER
				{
					name = ModuleIgnitionPropellant
					moduleID = chemTechOxidizer
				}
				DATA 
				{ 
					resourceName = NTO 
				}
			}
			MODULE
			{
				IDENTIFIER
				{
					name = ModuleIgnitionEngineController
					moduleID = chemTechFuelOxidizer
				}
				DATA
				{                    
					-FixedIgnitors = _
					-IGNITION_RESOURCE{}
				}
			}
		}
	}
}
@PART[bluedog_LR87_Single]:FOR[zzz_ChemicalPropulsion]
{
	-MODULE[ModuleB9PartSwitch]:HAS[#moduleID[chemTechFuelSwitch]] {}
	-MODULE[ModuleB9PartSwitch]:HAS[#moduleID[chemTechOxidizerSwitch]] {}
}

