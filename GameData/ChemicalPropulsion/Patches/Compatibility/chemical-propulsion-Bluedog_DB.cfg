// X-15 XLR11 & XLR99
@PART[bluedog_X15_Engine]:BEFORE[zz_ChemicalPropulsion]
{
	@MODULE[ModuleEngines*],*
	{
		chemTechFuel = LqdAmmonia
		chemTechOxidizer = LqdOxygen
	}

	@MODULE[ModuleB9PartSwitch]:HAS[#moduleID[engineSwitch]]
	{
		chemTechConvertEngineSwitch = true

		@SUBTYPE[XLR99]
		{
			chemTechFuel = LqdAmmonia
			chemTechOxidizer = LqdOxygen
		}
		@SUBTYPE[XLR11]
		{
			chemTechFuel = Ethanol
			chemTechOxidizer = LqdOxygen
		}
		@SUBTYPE[XLR99E]
		{
			chemTechFuel = LqdAmmonia
			chemTechOxidizer = LqdOxygen
			@MODULE:HAS[@IDENTIFIER[ModuleEnginesFX]]
			{
				@DATA
				{
					@runningEffectName = running_engine // Yes... this goes a bit past the scope, but running_xlr99e is not a defined effect in BDB and it needs to be fixed.
				}
			}
		}
	}
}
@PART[bluedog_X15_Engine]:FOR[zzz_ChemicalPropulsion]
