	{
		%chemTechPropellant = LqdAmmonia
	}
}

// MORL resistojet RCS
@PART[bluedog_MORL_resistojet_RCS]:BEFORE[zz_ChemicalPropulsion]
{
	@MODULE[ModuleRCS*],*
	{
		chemTechPropellant = HTP
		chemTechPropellant = LqdAmmonia
		chemTechPropellant = Hydrazine
		chemTechPropellant = LqdHydrogen
		chemTechPropellant = LqdMethane
	}

	chemTechPropellantRatio = #$MODULE[ModuleRCSFX]/PROPELLANT[MonoPropellant]/ratio$

	-MODULE[ModuleB9PartSwitch]:HAS[@SUBTYPE[MonoPropellant]] {}
}
@PART[bluedog_MORL_resistojet_RCS]:AFTER[zzz_ChemicalPropulsion]
{
	@MODULE[ModuleIgnitionPropellant]
	{
		ratio = #$../chemTechPropellantRatio$
		@ratio *= 4
		@ratio /= 0.7021
	}
}

// Set engines with existing switch to not use Ignition's auto-computation of thrust and isp
@PART[bluedog_*]:HAS[@MODULE[ModuleB9PartSwitch]:HAS[#moduleID[engineSwitch],@SUBTYPE:HAS[#chemTechFuel,#chemTechOxidizer]]]:FOR[zzz_ChemicalPropulsion]
{
	@MODULE[ModuleIgnitionEngineController]
	{
		%AutoComputeMaxThrust = false
		%AutoComputeIspVacuum = false
		%AutoComputeIspSeaLevel = false
	}

	-MODULE[ModuleB9PartSwitch]:HAS[#moduleID[chemTechFuelSwitch]] {}
	-MODULE[ModuleB9PartSwitch]:HAS[#moduleID[chemTechOxidizerSwitch]] {}
}



// Miscellaneous  changes

// Minuteman PSRE
@PART[bluedog_Minuteman_PSRE]:AFTER[zzz_ChemicalPropulsion]
{
	@MODULE[ModuleIgnitionRCSController]:HAS[#moduleID[chemTechPropellant]]
	{
		@moduleID = chemTechFuelOxidizer
		@propellantModuleID = chemTechFuelOxidizer
	}

	@MODULE[ModuleIgnitionTankController]:HAS[#moduleID[chemTechFuelOxidizer]]
	{
		@volume += #$../MODULE[ModuleIgnitionTankController]:HAS[#moduleID[chemTechPropellant]]/volume$
		@addedMass += #$../MODULE[ModuleIgnitionTankController]:HAS[#moduleID[chemTechPropellant]]/addedMass$
		@addedCost += #$../MODULE[ModuleIgnitionTankController]:HAS[#moduleID[chemTechPropellant]]/addedCost$
	}

	-MODULE[ModuleIgnitionPropellant]:HAS[#moduleID[chemTechPropellant]] {}
	-MODULE[ModuleIgnitionTankController]:HAS[#moduleID[chemTechPropellant]] {}
}

