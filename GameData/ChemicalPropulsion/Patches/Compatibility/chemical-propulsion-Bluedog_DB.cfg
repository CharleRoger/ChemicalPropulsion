@PART[bluedog_Vega_Tank1,bluedog_Vega_Tank2]:AFTER[zz_ChemicalPropulsion]
{
	@MODULE[ModuleB9PartSwitch]:HAS[#moduleID[meshSwitch*]]
	{
		chemTechConvertModule = true
	}
}
@PART[bluedog_*]:HAS[@MODULE[ModuleB9PartSwitch]:HAS[#chemTechConvertModule[true]]]:AFTER[zz_ChemicalPropulsion]
{
	@MODULE[ModuleB9PartSwitch]:HAS[#chemTechConvertModule[true]]
	{
		@parentID = chemTechFuelSwitch

		// baseVolume should have already been consumed by chemical-propulsion-B9PartSwitch.cfg

		@SUBTYPE:HAS[#volumeAdded],*
		{
			-tankType = _
			MODULE
			{
				IDENTIFIER
				{
					name = ModuleIgnitionTankController
					moduleID = chemTechFuelOxidizer
				}
				DATA
				{
					volume = #$../../volumeAdded$
					@volume *= 5
					@volume += #$../../../../chemTechTankVolumeFuelOxidizer$
				}
			}
		}
		@SUBTYPE:HAS[#volumeAddedToParent],*
		{
			-tankType = _
			MODULE
			{
				IDENTIFIER
				{
					name = ModuleIgnitionTankController
					moduleID = chemTechFuelOxidizer
				}
				DATA
				{
					volume = #$../../volumeAddedToParent$
					@volume *= 5
					@volume += #$../../../../chemTechTankVolumeFuelOxidizer$
				}
			}
		}
		@SUBTYPE:HAS[~volumeAdded,~volumeAddedToParent],*
		{
			-tankType = _
			MODULE
			{
				IDENTIFIER
				{
					name = ModuleIgnitionTankController
					moduleID = chemTechFuelOxidizer
				}
				DATA
				{
					volume = #$../../../../chemTechTankVolumeFuelOxidizer$
				}
			}
		}
	}
}
@PART[bluedog_Mercury_Retropack]:AFTER[zz_ChemicalPropulsion]
{
	@MODULE[ModuleB9PartSwitch]:HAS[#moduleID[meshSwitchStyle]]
	{
		%parentID = chemTechPropellantSwitch
		
		@SUBTYPE[Enhanced]
		{
			MODULE
			{
				IDENTIFIER
				{
					name = ModuleIgnitionTankController
					moduleID = chemTechPropellant
				}
				DATA
				{
					volume = 32
					@volume += #$../../../../chemTechTankVolumePropellant$
				}
			}
			-RESOURCE[MonoPropellant] {}
		}
		@SUBTYPE[Basic]
		{
			-volumeAdded = _
			MODULE
			{
				IDENTIFIER
				{
					name = ModuleIgnitionTankController
					moduleID = chemTechPropellant
				}
				DATA
				{
					volume = #$../../../../chemTechTankVolumePropellant$
				}
			}
			-RESOURCE[MonoPropellant] {}
		}
	}
}

