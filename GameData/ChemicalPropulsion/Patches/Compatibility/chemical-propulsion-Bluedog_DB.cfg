// Some trickier tank volume cases
@PART[bluedog_*]:HAS[~chemTechTankVolumeFuelOxidizer,@MODULE[ModuleB9PartSwitch]:HAS[#baseVolume,~baseVolume[0],!SUBTYPE:HAS[~tankType],@SUBTYPE:HAS[#tankType[bdb*]]]]:AFTER[zz_ChemicalPropulsion]
{
	%chemTechTankVolumeFuelOxidizer = #$MODULE[ModuleB9PartSwitch]:HAS[#baseVolume,~baseVolume[0],!SUBTYPE:HAS[~tankType],@SUBTYPE:HAS[#tankType[bdb*]]]/baseVolume$
	@chemTechTankVolumeFuelOxidizer *= 5
	-MODULE[ModuleB9PartSwitch]:HAS[#baseVolume,~baseVolume[0],~moduleID[engineSwitch],!SUBTYPE:HAS[~tankType],@SUBTYPE:HAS[#tankType[bdb*]]] {}
}
@PART[bluedog_DeltaE_Tank,bluedog_DeltaK_Stage,bluedog_DeltaIV_DCSS_5m,bluedog_DCSS_Tank,bluedog_Vanguard_S2_Tank,bluedog_Vega_EngineMount,bluedog_Vega_ThirdStage_Tank,bluedog_Centaur_Kickstage,bluedog_LM_Ascent_Cockpit,bluedog_LM_Taxi,bluedog_Ablestar_Tank,bluedog_voyagerMarsOrbiter_propulsionModule]
{
	%chemTechTankVolumePropellant = #$RESOURCE[MonoPropellant]/maxAmount$
	chemTechTankMassPropellant = #$chemTechTankVolumePropellant$
	@chemTechTankMassPropellant *= 0.000125
	@chemTechTankVolumePropellant *= 4
}
@PART[bluedog_Agena_EquipmentRack]
{
	%chemTechTankVolumePropellant = #$MODULE[ModuleB9PartSwitch]:HAS[#moduleID[meshSwitchTanks]]/baseVolume$
	chemTechTankMassPropellant = #$chemTechTankVolumePropellant$
	@chemTechTankMassPropellant *= 0.000125
	@chemTechTankVolumePropellant *= 4
}
@PART[bluedog_MOL_EquipmentSection,bluedog_BigG_CylindricalSM_EquipmentModule,bluedog_BigG_ConicSM_CargoModule]:AFTER[zz_ChemicalPropulsion]
{
	chemTechTankVolumeFuelOxidizer = 0
	chemTechTankMassFuelOxidizer = 0
	chemTechTankCostFuelOxidizer = 0
}
@PART[bluedog_MOL_EquipmentSection,bluedog_BigG_CylindricalSM_EquipmentModule,bluedog_BigG_ConicSM_CargoModule,bluedog_Titan_Transtage,bluedog_Mariner71_PropulsionModule,bluedog_LM_Ascent_Cockpit,bluedog_LM_Taxi,bluedog_Ablestar_Tank,bluedog_voyagerMarsOrbiter_propulsionModule]:AFTER[zz_ChemicalPropulsion]
{
	@chemTechTankVolumeFuelOxidizer += #$chemTechTankVolumePropellant$
	@chemTechTankMassFuelOxidizer += #$chemTechTankMassPropellant$
	@chemTechTankCostFuelOxidizer += #$chemTechTankCostPropellant$

	-chemTechTankVolumePropellant = _
	-chemTechTankMassPropellant = _
	-chemTechTankCostPropellant = _
}
@PART[bluedog_Mercury_Retropack]:AFTER[zz_ChemicalPropulsion]
{
	%chemTechTankVolumePropellant = 0
	@MODULE[ModuleB9PartSwitch]:HAS[#moduleID[meshSwitchStyle]]
	{
		%parentID = chemTechPropellantSwitch
		
		@SUBTYPE[Enhanced]
		{
			MODULE
			{
				IDENTIFIER
				{
					name = ModuleIgnitionTankController
					moduleID = chemTechPropellant
				}
				DATA
				{
					volume = #$../../RESOURCE[MonoPropellant]/unitsPerVolume$
					@volume *= 4
				}
			}
			-RESOURCE[MonoPropellant] {}
		}
	}
}



// Solid engines

@PART[bluedog_AtlasV_GEM63,bluedog_LittleJoe2_Recruit,bluedog_Delta_GEM40,bluedog_Delta_GEM46,bluedog_Delta_GEM60,bluedog_Explorer_Star17,bluedog_Castor2,bluedog_Castor4,bluedog_Peacekeeper_Castor120,bluedog_UpperSolids_Altair,bluedog_UpperSolids_Star24,bluedog_UpperSolids_Star37BV,bluedog_UpperSolids_Star37FMV,bluedog_UpperSolids_Star48BV,bluedog_SRMU,bluedog_Titan2_S2_VernierMotor,bluedog_UA120,bluedog_Saturn_AJ260,bluedog_Minotaur1_SR19,bluedog_Scout_Algol_Inline,bluedog_Scout_Algol_Radial,bluedog_Scout_Algol_Short,bluedog_Scout_Castor_Inline,bluedog_Scout_Antares_Inline]:HAS[@RESOURCE[SolidFuel]]:BEFORE[zz_ChemicalPropulsion]
{
	chemTechTankVolumePropellant = #$RESOURCE[SolidFuel]/maxAmount$
	chemTechTankCostPropellant = #$chemTechTankVolumePropellant$
	@chemTechTankCostPropellant *= #$@RESOURCE_DEFINITION[SolidFuel]/unitCost$
	@chemTechTankVolumePropellant *= 5
	-RESOURCE[SolidFuel],* {}
}
@PART[bluedog_AtlasV_GEM63,bluedog_LittleJoe2_Recruit,bluedog_Delta_GEM40,bluedog_Delta_GEM46,bluedog_Delta_GEM60,bluedog_Explorer_Star17,bluedog_Castor2,bluedog_Castor4,bluedog_Peacekeeper_Castor120,bluedog_UpperSolids_Altair,bluedog_UpperSolids_Star24,bluedog_UpperSolids_Star37BV,bluedog_UpperSolids_Star37FMV,bluedog_UpperSolids_Star48BV,bluedog_SRMU,bluedog_Titan2_S2_VernierMotor,bluedog_UA120,bluedog_Saturn_AJ260,bluedog_Minotaur1_SR19,bluedog_Scout_Algol_Inline,bluedog_Scout_Algol_Radial,bluedog_Scout_Algol_Short,bluedog_Scout_Castor_Inline,bluedog_Scout_Antares_Inline,bluedog_Titan2_S2_VernierMotor]:HAS[!RESOURCE[SolidFuel],@MODULE[ModuleB9PartSwitch]:HAS[#baseVolume,@SUBTYPE:HAS[@RESOURCE[SolidFuel]]]]:BEFORE[zz_ChemicalPropulsion]
{
	chemTechTankVolumePropellant = #$MODULE[ModuleB9PartSwitch]:HAS[#baseVolume,@SUBTYPE:HAS[@RESOURCE[SolidFuel]]]/baseVolume$
	@chemTechTankVolumePropellant *= 5

	@MODULE[ModuleB9PartSwitch]:HAS[#baseVolume,@SUBTYPE:HAS[@RESOURCE[SolidFuel]]]
	{
		chemTechConvertEngineSwitch = true
		chemTechConvertTankSwitch = true
		
		@SUBTYPE:HAS[@RESOURCE[SolidFuel]],*
		{
			-RESOURCE[SolidFuel],* {}
		}
	}
}
@PART[bluedog_Minotaur1_SR19,bluedog_Scout_Algol_Inline,bluedog_Scout_Algol_Radial,bluedog_Scout_Algol_Short,bluedog_Scout_Castor_Inline,bluedog_Scout_Antares_Inline,bluedog_Hexagon_Mk8_Retro,bluedog_Corona_Retro]:HAS[@RESOURCE[MonoPropellant],@MODULE[ModuleRCSFX]]:BEFORE[zz_ChemicalPropulsion]
{
	@MODULE[ModuleRCSFX],*
	{
		chemTechPropellant = Hydrazine
		chemTechPropellant = HTP
		-PROPELLANT[MonoPropellant] {}
	}

	chemTechTankVolumeRCS = #$RESOURCE[MonoPropellant]/maxAmount$
	chemTechTankCostRCS = #$chemTechTankVolumeRCS$
	@chemTechTankCostRCS *= #$@RESOURCE_DEFINITION[MonoPropellant]/unitCost$
	@chemTechTankVolumeRCS *= 4
	chemTechTankMassRCS = #$chemTechTankVolumeRCS$
	@chemTechTankMassRCS *= 0.000125
	-RESOURCE[MonoPropellant],* {}

	MODULE
	{
		name = ModuleIgnitionRCSController
		moduleID = chemTechRCSPropellant
		propellantModuleID = chemTechRCSPropellant
	}
	MODULE
	{
		name = ModuleIgnitionTankController
		moduleID = chemTechRCSPropellant
		propellantModuleID = chemTechRCSPropellant
		volume = #$../chemTechTankVolumeRCS$
		%addedMass = #$../chemTechTankMassRCS$
		@addedMass *= -1
		%addedCost = #$../chemTechTankCostRCS$
		@addedCost *= -1
	}
	MODULE
	{
		name = ModuleIgnitionPropellant
		moduleID = chemTechRCSPropellant
		resourceName = Hydrazine
	}
	MODULE
	{
		name = ModuleB9PartSwitch
		moduleID = chemTechPropellantSwitchRCS
		switcherDescription = RCS Propellant
		switcherDescriptionPlural = RCS Propellants
		switchInFlight = False
		chemTechSwitchResourceName = HTP
		chemTechSwitchResourceName = Hydrazine
		uiGroupName = partSwitch
		uiGroupDisplayName = Part Switch
		SUBTYPE
		{
			name = HTP
			title = #LOC_ChemicalCore_HTP_title
			descriptionSummary = #LOC_ChemicalPropulsion_propellant_storable_hypergolic_oxidizer_description
			descriptionDetail = #LOC_ChemicalPropulsion_propellant_HTP_description
			primaryColor = #$@ChemicalCoreResourceColors/HTP$
			defaultSubtypePriority = -16
			MODULE
			{
				IDENTIFIER
				{
					name = ModuleIgnitionPropellant
					moduleID = chemTechRCSPropellant
				}
				DATA
				{
					resourceName = HTP
				}
			}
		}
		SUBTYPE
		{
			name = Hydrazine
			title = #LOC_ChemicalCore_Hydrazine_title
			descriptionSummary = #LOC_ChemicalPropulsion_propellant_storable_hypergolic_fuel_description
			descriptionDetail = #LOC_ChemicalPropulsion_propellant_Hydrazine_description
			primaryColor = #$@ChemicalCoreResourceColors/Hydrazine$
			upgradeRequired:NEEDS[ChemicalTechTree] = chemical-tech-tree-partupgrade-Hydrazine
			defaultSubtypePriority = -3
			MODULE
			{
				IDENTIFIER
				{
					name = ModuleIgnitionPropellant
					moduleID = chemTechRCSPropellant
				}
				DATA
				{
					resourceName = Hydrazine
				}
			}
		}
	}
}
@PART[bluedog_Minotaur1_SR19,bluedog_Scout_Algol_Inline,bluedog_Scout_Algol_Radial,bluedog_Scout_Algol_Short,bluedog_Scout_Castor_Inline,bluedog_Scout_Antares_Inline,bluedog_Hexagon_Mk8_Retro,bluedog_Corona_Retro]:HAS[@MODULE[ModuleRCSFX]]:AFTER[zzz_ChemicalPropulsion]
{
	@MODULE[ModuleB9PartSwitch]:HAS[#moduleID[chemTechPropellantSwitch]]
	{
		-chemTechSwitchResourceName = HTP
		-chemTechSwitchResourceName = Hydrazine
		%chemTechSwitchResourceName = PBAN
		-SUBTYPE[HTP]{}
		-SUBTYPE[Hydrazine]{}
		@SUBTYPE[PBAN]
		{
			-upgradeRequired = _
		}
	}
}



