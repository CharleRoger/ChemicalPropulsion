				IDENTIFIER
				{
					name = ModuleIgnitionEngineController
				}
				DATA
				{
					MaxThrustOriginal = #$../../MODULE:HAS[@IDENTIFIER[ModuleEnginesFX]]/DATA/maxThrust$
					IspVacuumOriginal = #$../../MODULE:HAS[@IDENTIFIER[ModuleEnginesFX]]/DATA/atmosphereCurve/key,0[1, ]$
					IspSeaLevelOriginal = #$../../MODULE:HAS[@IDENTIFIER[ModuleEnginesFX]]/DATA/atmosphereCurve/key,1[1, ]$
				}
			}
		}

		// AmmoniaLox w/ Nozzle Extension
		@SUBTYPE[XLR99E]
		{
			upgradeRequired = chemical-core-partupgrade-LqdAmmonia
			primaryColor = #$@ChemicalCoreResourceColors/LqdAmmonia$
			secondaryColor = #$@ChemicalCoreResourceColors/LqdOxygen$
			@descriptionSummary ^= :$:$0 Uses <color=#fffd78>LqdAmmonia</color> for fuel.
			@MODULE:HAS[@IDENTIFIER[ModuleEnginesFX]]
			{
				@DATA
				{
					@runningEffectName = running_engine // Yes... this goes a bit past the scope, but running_xlr99e is not a defined effect in BDB and it needs to be fixed.
				}
			}
			MODULE
			{
				IDENTIFIER
				{
					name = ModuleIgnitionPropellant
					moduleID = chemTechFuel
				}
				DATA
				{
					resourceName = LqdAmmonia
				}
			}
			MODULE
			{
				IDENTIFIER
				{
					name = ModuleIgnitionPropellant
					moduleID = chemTechOxidizer
				}
				DATA
				{
					resourceName = LqdOxygen
				}
			}
			MODULE
			{
				IDENTIFIER
				{
					name = ModuleIgnitionEngineController
				}
				DATA
				{
					MaxThrustOriginal = #$../../MODULE:HAS[@IDENTIFIER[ModuleEnginesFX]]/DATA/maxThrust$
					IspVacuumOriginal = #$../../MODULE:HAS[@IDENTIFIER[ModuleEnginesFX]]/DATA/atmosphereCurve/key,0[1, ]$
					IspSeaLevelOriginal = #$../../MODULE:HAS[@IDENTIFIER[ModuleEnginesFX]]/DATA/atmosphereCurve/key,1[1, ]$
				}
			}
		}
	}        
