@PARTUPGRADE[chemical-tech-tree-partupgrade-Aniline]:NEEDS[CNAR]
{
	%chemTechActive = true
}
@PART:HAS[#chemTechTankType[bipropellant],~chemTechFuel[Aniline]]:NEEDS[CNAR]:FOR[zz_ChemicalPropulsion]
{
	chemTechFuel = Aniline
}
@PART:HAS[#chemTechTankType[storable],~chemTechPropellant[Aniline]]:NEEDS[CNAR]:FOR[zz_ChemicalPropulsion]
{
	chemTechPropellant = Aniline
}

