// Add PSPC and HTPB solid propellant option to solid rocket engines (also handles RCS)

@PART:HAS[@MODULE:HAS[#chemTechPropellant[PBAN]]]:NEEDS[ChemicalPropulsion]:FOR[zz_ChemicalPropulsionSolids]
{
	@MODULE:HAS[#chemTechPropellant[PBAN]]
	{
		chemTechPropellant = PSPC
		chemTechPropellant = HTPB
	}
}