// Activate part upgrades so that subtypes appear on part switches

@PARTUPGRADE[chemical-core-partupgrade-PSPC]:NEEDS[ChemicalPropulsion]
{
	%chemTechActive = true
}

@PARTUPGRADE[chemical-core-partupgrade-HTPB]:NEEDS[ChemicalPropulsion]
{
	%chemTechActive = true
}

// PSPC replaces PBAN as the starting solid propellant, so move PBAN to Advanced Rocketry

@PARTUPGRADE[chemical-core-partupgrade-PBAN]:HAS[#chemTechActive[true]]:FOR[zzz_ChemicalCore]
{
	%techRequired = advRocketry
}