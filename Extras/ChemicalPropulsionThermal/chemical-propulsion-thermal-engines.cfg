@PART:HAS[@MODULE:HAS[#chemTechPropellant[LqdHydrogen],~chemTechFuel,~chemTechOxidizer],!MODULE[ModuleEngines*]:HAS[#chemTechPropellant,#chemTechOxidizer]]:FOR[zz_ChemicalPropulsionNuclear]
{
	@MODULE:HAS[#chemTechPropellant[LqdHydrogen],~chemTechFuel,~chemTechOxidizer],*
	{
		chemTechPropellant = LqdMethane
		chemTechPropellant = LqdAmmonia
		chemTechPropellant = Water
		chemTechPropellant = LqdCO2
		chemTechPropellant = LqdCO
		chemTechPropellant = LqdNitrogen
	}
}
@PART:HAS[@MODULE:HAS[#chemTechPropellant[LqdHydrogen],~chemTechFuel,~chemTechOxidizer],@MODULE:HAS[#chemTechPropellant,#chemTechOxidizer]]:FOR[zz_ChemicalPropulsionNuclear]
{
	@MODULE:HAS[#chemTechPropellant[LqdHydrogen],~chemTechFuel,~chemTechOxidizer],*
	{
		chemTechPropellant = LqdMethane
		chemTechPropellant = LqdAmmonia
		chemTechPropellant = LqdCO
	}
	@MODULE:HAS[#chemTechPropellant[LqdHydrogen],#chemTechOxidizer[LqdOxygen]],*
	{
		chemTechPropellant = LqdMethane
		chemTechPropellant = LqdAmmonia
		chemTechPropellant = LqdCO
	}
}